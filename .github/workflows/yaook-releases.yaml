name: yaook openstack releases
on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1" # Monday 03:00 UTC
permissions:
  contents: "write"
  pull-requests: "write"
jobs:
  check-releases:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch supported releases per component from yaook operator
        id: fetch
        run: |
          # 1. Read our current yaook operator chart version from the
          #    HelmRelease manifests. All operators share the same version.
          CHART_VERSION=$(grep -roh 'version: "[0-9][^"]*"' infrastructure/yaook-operator/ \
            | head -1 | grep -o '"[^"]*"' | tr -d '"')
          echo "Current chart version: $CHART_VERSION"

          # 2. Find the matching tag in the yaook GitLab repo.
          TAG="v${CHART_VERSION}"
          TAG_EXISTS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://gitlab.com/api/v4/projects/yaook%2Foperator/repository/tags/${TAG}")
          if [ "$TAG_EXISTS" != "200" ]; then
            echo "WARNING: Tag $TAG not found on GitLab, falling back to default branch"
            PROJECT_INFO=$(curl -s "https://gitlab.com/api/v4/projects/yaook%2Foperator")
            REF=$(echo "$PROJECT_INFO" | jq -r '.default_branch')
            TAG_INFO="(default branch: $REF)"
          else
            REF="$TAG"
            TAG_INFO="(tag: $TAG)"
          fi
          echo "Using ref: $REF $TAG_INFO"

          # 3. Components and their source file paths in the yaook repo.
          declare -A COMPONENT_FILES=(
            [keystone]="yaook/op/keystone/cr.py"
            [nova]="yaook/op/nova/cr.py"
            [glance]="yaook/op/glance/__init__.py"
            [neutron]="yaook/op/neutron/__init__.py"
            [cinder]="yaook/op/cinder/__init__.py"
            [horizon]="yaook/op/horizon/__init__.py"
            [octavia]="yaook/op/octavia/__init__.py"
            [designate]="yaook/op/designate/__init__.py"
          )

          # 4. Fetch per-component releases and build a mapping file.
          #    Output format: one line per component: "component=release1,release2,..."
          RELEASE_MAP=""
          for component in "${!COMPONENT_FILES[@]}"; do
            file_path="${COMPONENT_FILES[$component]}"
            encoded_path=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$file_path', safe=''))")

            content=$(curl -s "https://gitlab.com/api/v4/projects/yaook%2Foperator/repository/files/${encoded_path}/raw?ref=${REF}")

            if echo "$content" | jq -e '.message' >/dev/null 2>&1; then
              echo "WARNING: Failed to fetch $file_path: $(echo "$content" | jq -r '.message')"
              continue
            fi

            tmpfile=$(mktemp)
            echo "$content" > "$tmpfile"
            releases=$(python3 -c "
          import sys, re
          with open(sys.argv[1]) as f:
              text = f.read()
          m = re.search(r'RELEASES\s*=\s*\[(.*?)\]', text, re.DOTALL)
          if m:
              for line in m.group(1).splitlines():
                  line = line.strip().strip(',').strip('\"').strip(\"'\")
                  if re.match(r'^\d{4}\.\d+$', line):
                      print(line)
          " "$tmpfile")
            rm -f "$tmpfile"

            # Sort releases for this component
            sorted_releases=$(echo "$releases" | sort -t. -k1,1n -k2,2n | tr '\n' ',' | sed 's/,$//')
            echo "Component $component: $sorted_releases"
            RELEASE_MAP="${RELEASE_MAP}${component}=${sorted_releases}\n"
          done

          echo "release_map<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$RELEASE_MAP" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "tag_info=$TAG_INFO" >> "$GITHUB_OUTPUT"

      - name: Determine per-component upgrades
        id: upgrade
        run: |
          RELEASE_MAP="${{ steps.fetch.outputs.release_map }}"

          # For each CR, find the next single-step release from that
          # component's own RELEASES list. Each component upgrades independently.
          UPGRADE_NEEDED=false
          CHANGES=""
          SUMMARY=""

          for f in infrastructure/yaook/*.yaml; do
            if ! grep -q 'targetRelease:' "$f"; then
              continue
            fi

            basename=$(basename "$f" .yaml)
            case "$basename" in
              keystone|nova|glance|neutron|cinder|horizon|octavia|designate)
                component="$basename" ;;
              *)
                echo "WARNING: Unknown component for $f, skipping"
                continue
                ;;
            esac

            current=$(grep 'targetRelease:' "$f" | head -1 | grep -o '"[0-9]\{4\}\.[0-9]*"' | tr -d '"')
            [ -z "$current" ] && continue

            # Get this component's supported releases
            component_line=$(echo -e "$RELEASE_MAP" | grep "^${component}=")
            component_releases=$(echo "$component_line" | cut -d= -f2 | tr ',' '\n')

            # Find the next release after current (single-step only)
            NEXT=$(echo "$component_releases" | awk -v cur="$current" '
              found { print; exit }
              $0 == cur { found=1 }
            ')

            if [ -n "$NEXT" ]; then
              SORTED=$(printf '%s\n%s\n' "$current" "$NEXT" | sort -t. -k1,1n -k2,2n | tail -1)
              if [ "$SORTED" = "$NEXT" ] && [ "$current" != "$NEXT" ]; then
                echo "$f ($component): $current -> $NEXT"
                CHANGES="${CHANGES}${f}|${component}|${current}|${NEXT}\n"
                SUMMARY="${SUMMARY}| ${component}: ${current} → ${NEXT}\n"
                UPGRADE_NEEDED=true
                continue
              fi
            fi

            echo "$f ($component): $current (up to date)"
          done

          echo "needs_upgrade=$UPGRADE_NEEDED" >> "$GITHUB_OUTPUT"
          echo "changes<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$CHANGES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "summary<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Apply upgrades
        if: steps.upgrade.outputs.needs_upgrade == 'true'
        run: |
          CHANGES="${{ steps.upgrade.outputs.changes }}"

          echo "=== Upgrade plan ==="
          echo -e "$CHANGES" | while IFS='|' read -r file component current target; do
            [ -z "$file" ] && continue
            echo "  $component: $current -> $target ($file)"
          done
          echo "==================="

          echo -e "$CHANGES" | while IFS='|' read -r file component current target; do
            [ -z "$file" ] && continue
            sed -i "s/targetRelease:.*/targetRelease: \"$target\"/" "$file"
            echo "Updated $file: $current -> $target"
          done

      - name: Create Pull Request
        if: steps.upgrade.outputs.needs_upgrade == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(yaook): upgrade OpenStack releases"
          title: "chore(yaook): upgrade OpenStack releases"
          body: |
            Automated per-component upgrade of yaook OpenStack service deployments.

            **Operator chart version:** ${{ steps.fetch.outputs.ref }} ${{ steps.fetch.outputs.tag_info }}

            **Source:** [yaook/operator](https://gitlab.com/yaook/operator)

            ### Upgrade plan

            ${{ steps.upgrade.outputs.summary }}

            Each component is upgraded to the **next single-step release** from its own `RELEASES` list. Components already at their latest are not changed.

            **Before merging:** verify the upgrade path is valid for your deployment. Check the [yaook upgrade documentation](https://yaook.cloud/docs/) for any breaking changes between releases.
          branch: "yaook-release-upgrade"
          delete-branch: true
