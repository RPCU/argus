apiVersion: v1
kind: ConfigMap
metadata:
  name: chihiro-config
data:
  config.yaml: |
    # Most configuration is now handled via environment variables
    # See deployment.yaml for CHIHIRO_* environment variables
    cluster:
      injections:
        name:
          path: metadata.name
        version:
          path: spec.topology.version
          label: "Kubernetes Version"
          editable: true
        serviceDomain:
          path: spec.clusterNetwork.serviceDomain
        groups:
          label: "Access Groups"
          editable: true
        workerGroups:
          path: spec.topology.workers.machineDeployments
          label: "Worker Groups"
          editable: true
        controlPlaneReplicas:
          path: spec.topology.controlPlane.replicas
          label: "Control Plane Replicas"
          editable: true
          min: 1
          max: 9
      template: |
        apiVersion: cluster.x-k8s.io/v1beta2
        kind: Cluster
        metadata:
          namespace: mgmt
          labels:
            sveltos.argus.rpcu.io/oidc-rbac: enabled
            sveltos.argus.rpcu.io/cilium: enabled
            type: workload
        spec:
          clusterNetwork:
            pods:
              cidrBlocks:
                - {{ chihiro.podCIDR }}
            serviceDomain: ignore
            services:
              cidrBlocks:
                - {{ chihiro.serviceCIDR }}
          topology:
            classRef:
              name: openstack-kamaji
            controlPlane:
              replicas: 0
            variables:
              - name: identityRef
                value:
                  name: mgmt-cloud-config
                  cloudName: openstack
              - name: externalNetworkId
                value: 1cfd69da-057c-4748-a0d4-de5b0ca77db2
              - name: imageName
                value: {{ chihiro.imageName }}
              - name: oidc
                value:
                  enabled: true
                  issuerURL: https://rpcu-gabeck.eu1.zitadel.cloud
                  clientID: "377050089077613929"
              - name: managedSubnetCIDR
                value: {{ chihiro.managedSubnetCIDR }}
            version: "0.0.0"
      parameters:
        podCIDR:
          label: "Pod CIDR"
          description: "CIDR block for pod networking"
          type: string
          default: "10.207.0.0/16"
        serviceCIDR:
          label: "Service CIDR"
          description: "CIDR block for service networking"
          type: string
          default: "10.107.0.0/16"
        imageName:
          label: "Node Image"
          description: "OpenStack image for cluster nodes"
          type: string
          default: "hephaestus-kaas-26.05-{{ chihiro.version }}"
        managedSubnetCIDR:
          label: "Managed Subnet CIDR"
          description: "CIDR block for the managed subnet"
          type: string
          default: "192.168.1.0/24"
