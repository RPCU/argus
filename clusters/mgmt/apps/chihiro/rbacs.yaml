apiVersion: v1
kind: ServiceAccount
metadata:
  name: chihiro
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: chihiro-viewer-role
rules:
  # Core API discovery permissions
  - apiGroups: [""]
    resources: [""]
    verbs: ["get"]
  - apiGroups: ["*"]
    resources: [""]
    verbs: ["get"]
  # Namespace permissions for listing namespaces
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  # Secret read permission for retrieving cluster CA certificates
  # (used to embed certificate-authority-data in generated kubeconfigs)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  # Cluster API permissions for watching and viewing clusters
  - apiGroups: ["cluster.x-k8s.io"]
    resources: ["clusters", "machinesets", "machines", "machinedeployments"]
    verbs: ["get", "list", "watch"]
  # Cluster object modification permissions (mgmt namespace only)
  - apiGroups: ["cluster.x-k8s.io"]
    resources: ["clusters"]
    verbs: ["create", "update", "patch", "delete"]
    resourceNames: []
  # Infrastructure provider resources
  - apiGroups: ["infrastructure.cluster.x-k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # Control plane provider resources
  - apiGroups: ["controlplane.cluster.x-k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # Bootstrap provider resources
  - apiGroups: ["bootstrap.cluster.x-k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: chihiro-viewer-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: chihiro-viewer-role
subjects:
  - kind: ServiceAccount
    name: chihiro
    namespace: chihiro-system
