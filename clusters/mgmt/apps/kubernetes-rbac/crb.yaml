# OIDC group -> RBAC bindings for the workload cluster's kube-apiserver.
#
# The apiserver is wired to Zitadel OIDC by the "oidc" ClusterClass variable
# (infrastructure/cluster-api-templates) with an EMPTY --oidc-groups-prefix.
# The shared Zitadel "groupsClaim" Action
# (clusters/openstack/crossplane/zitadel/actions.yaml) injects the user's
# project role keys into the token's "groups" claim as BARE names, so a user
# granted the "kubernetes" project's kube-admin / kube-user role
# (clusters/openstack/crossplane/zitadel/roles.yaml) lands in the Kubernetes
# group "kube-admin" / "kube-user" respectively. Mirrors the bealv pattern
# (gitops/apps/kubernetes/crb.yaml).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: oidc-kube-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: kube-admin
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: oidc-kube-user
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: kube-user
