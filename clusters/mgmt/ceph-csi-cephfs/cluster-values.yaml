# mgmt-specific override for the external CephFS CSI driver: the remote Ceph
# cluster FSID (clusterID) + monitor endpoints of the openstack Rook cluster.
# Appended as a second valuesFrom by clusters/mgmt/ceph-csi-cephfs.yaml so it
# overrides the empty csiConfig/clusterID in the base values.yaml.
#
# Monitors are pinned LoadBalancer IPs on the openstack cluster's Cilium L2
# network (10.0.0.242-244), reachable from mgmt over the VLAN.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ceph-csi-cephfs-cluster-values
  namespace: ceph-csi-cephfs
data:
  values.yaml: |
    csiConfig:
      - clusterID: "cbbf0098-8fc1-426e-b73d-b2b4ff6c7bb4"
        monitors:
          - "10.0.0.242:6789"
          - "10.0.0.243:6789"
          - "10.0.0.244:6789"
    storageClass:
      clusterID: "cbbf0098-8fc1-426e-b73d-b2b4ff6c7bb4"
