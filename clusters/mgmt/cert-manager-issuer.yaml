apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager-issuer
  namespace: flux-system
spec:
  interval: 10m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./clusters/mgmt/cert-manager-issuer
  prune: true
  wait: true
  timeout: 5m
  dependsOn:
    - name: cert-manager
    # The rpcu-lan-wildcard-tls leaf Certificate is created in the
    # kgateway-system namespace (same as the Gateway); that namespace is
    # provisioned by the kgateway-crds Kustomization.
    - name: kgateway-crds
