apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: chihiro
  namespace: flux-system
spec:
  interval: 10m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./clusters/mgmt/apps/chihiro
  prune: true
  timeout: 5m
  dependsOn:
    - name: cert-manager-issuer
    - name: kgateway
    - name: dragonfly-operator
    - name: external-secrets
    - name: crossplane-zitadel-mgmt
