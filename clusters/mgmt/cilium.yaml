apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 10m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./infrastructure/cilium
  prune: false
  patches:
    # Each cluster owns its own k8sServiceHost/Port. On mgmt the API endpoint
    # is auto-detected via the in-cluster kubernetes service, so the host/port
    # are left empty (chart default = auto).
    - patch: |
        apiVersion: helm.toolkit.fluxcd.io/v2
        kind: HelmRelease
        metadata:
          name: cilium
        spec:
          values:
            k8sServiceHost: "172.16.255.212"
            k8sServicePort: "6443"
      target:
        kind: HelmRelease
        name: cilium
    - patch: |
        apiVersion: "cilium.io/v2alpha1"
        kind: CiliumL2AnnouncementPolicy
        metadata:
          name: internal
        spec:
          interfaces:
            - "enp3s0"
      target:
        kind: CiliumL2AnnouncementPolicy
        name: internal
    - patch: |
        apiVersion: cilium.io/v2
        kind: CiliumLoadBalancerIPPool
        metadata:
          name: internal
        spec:
          allowFirstLastIPs: "Yes"
          blocks:
            - start: 192.168.1.2
              stop: 192.168.1.10
          disabled: false
      target:
        kind: CiliumLoadBalancerIPPool
        name: internal
