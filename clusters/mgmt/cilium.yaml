apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 10m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./infrastructure/cilium
  prune: false
  patches:
    # Each cluster owns its own k8sServiceHost/Port. On mgmt the API endpoint is
    # the apiServerFloatingIP from the Cluster CR (clusters/mgmt/clusters/mgmt.yaml).
    #
    # LoadBalancer services on this cluster are handled by the OpenStack Cloud
    # Controller Manager via Octavia (see infrastructure/openstack-ccm), NOT by
    # Cilium. We therefore disable Cilium's L2-announcement LoadBalancer
    # implementation here: turn off l2announcements in the HelmRelease values and
    # delete the base CiliumLoadBalancerIPPool / CiliumL2AnnouncementPolicy CRs.
    - patch: |
        apiVersion: helm.toolkit.fluxcd.io/v2
        kind: HelmRelease
        metadata:
          name: cilium
        spec:
          values:
            k8sServiceHost: "172.16.255.212"
            k8sServicePort: "6443"
            # VM enp3s0 NIC is MTU 1342 (from Neutron DHCP); VXLAN overhead is
            # 50 bytes. Cilium auto-detects 1342 from the device but VXLAN GSO
            # can produce outer packets of 1392 bytes, exceeding enp3s0 MTU and
            # getting silently dropped. Setting MTU to 1200 (1342-142 headroom)
            # ensures inner packets fit within the VXLAN tunnel.
            MTU: 1200
            # Octavia (OpenStack CCM) owns LoadBalancer services on mgmt; the
            # Cilium L2 announcer is not used. Disabling it stops the agent from
            # ARP-announcing any LoadBalancer/external IPs.
            l2announcements:
              enabled: false
      target:
        kind: HelmRelease
        name: cilium
    # Remove the shared base's LoadBalancer IP pool — Cilium no longer allocates
    # LB IPs on this cluster (Octavia does).
    - patch: |
        $patch: delete
        apiVersion: cilium.io/v2
        kind: CiliumLoadBalancerIPPool
        metadata:
          name: internal
      target:
        kind: CiliumLoadBalancerIPPool
        name: internal
    # Remove the shared base's L2 announcement policy.
    - patch: |
        $patch: delete
        apiVersion: "cilium.io/v2alpha1"
        kind: CiliumL2AnnouncementPolicy
        metadata:
          name: internal
      target:
        kind: CiliumL2AnnouncementPolicy
        name: internal
