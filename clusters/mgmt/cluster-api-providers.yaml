apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-api-providers
  namespace: flux-system
spec:
  interval: 10m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./infrastructure/cluster-api-providers
  prune: true
  wait: true
  timeout: 10m
  dependsOn:
    - name: cluster-api-operator
    - name: external-secrets
