apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: crossplane-resources
  namespace: flux-system
spec:
  interval: 10m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./clusters/mgmt/crossplane
  prune: false
  timeout: 5m
  dependsOn:
    - name: crossplane-compositions
    - name: crossplane-zitadel
    - name: crossplane-openstack
    - name: crossplane-vault
    - name: external-secrets
    - name: vault
