# mgmt-cluster concrete Crossplane resources:
#   - zitadel/              ProviderConfig + chihiro Oidc app (ns zitadel)
#   - openstack/            ProviderConfig + cloud-controller user/roles/app-cred
#                           (ns crossplane-system, cluster-scoped resources)
#   - cloud-controller-eso/ ESO plumbing rendering clouds.yaml for Sveltos
#                           (SA in kube-system, reads from crossplane-system)
#
# prune is false for zitadel as a safety belt; openstack and cloud-controller-eso
# can be pruned normally.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: crossplane-resources
  namespace: flux-system
spec:
  interval: 10m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./clusters/mgmt/crossplane
  prune: false
  timeout: 5m
  dependsOn:
    - name: crossplane-compositions
    - name: crossplane-zitadel
    - name: crossplane-openstack
