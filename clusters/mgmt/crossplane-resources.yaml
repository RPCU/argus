# mgmt-cluster concrete Crossplane resources: this cluster's own Zitadel
# ProviderConfig + the chihiro Oidc app (clusters/mgmt/crossplane/zitadel).
# Separate from the openstack cluster's crossplane-resources — mgmt only owns the
# chihiro Oidc, never the shared Zitadel platform.
#
# prune is false as a safety belt so a reconcile hiccup can't delete the live
# chihiro Zitadel app.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: crossplane-resources
  namespace: flux-system
spec:
  interval: 10m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./clusters/mgmt/crossplane/zitadel
  prune: false
  timeout: 5m
  dependsOn:
    - name: crossplane-zitadel
