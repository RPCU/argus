# ESO plumbing for the cloud-controller application credential (mgmt cluster).
#
# Reads the Crossplane-generated ApplicationCredentialV3 connection secret
# from crossplane-system and templates clouds.yaml for CCM / Cinder CSI.
#
# The resulting Secret (cloud-controller-clouds) in kube-system is picked up
# by Sveltos ClusterProfiles and pushed to child clusters' kube-system namespace.
#
# NOTE: The app-cred connection secret is written to crossplane-system by
# Crossplane (writeConnectionSecretToRef without namespace defaults to the
# resource's namespace, which is crossplane-system for cluster-scoped providers).
# =============================================================================

# ---------------------------------------------------------------------------
# RBAC: ServiceAccount in kube-system that can read the app-cred secret
# from the crossplane-system namespace, AND read kube-root-ca.crt in its
# own namespace (required by the SecretStore caProvider).
# ---------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloud-controller-reader
  namespace: kube-system
---
# Allow the SA to read kube-root-ca.crt in kube-system (SecretStore caProvider).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cloud-controller-reader-ca
  namespace: kube-system
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["kube-root-ca.crt"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cloud-controller-reader-ca
  namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cloud-controller-reader-ca
subjects:
  - kind: ServiceAccount
    name: cloud-controller-reader
    namespace: kube-system
---
# Allow the SA to read the app-cred secret in crossplane-system.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cloud-controller-app-cred-reader
  namespace: crossplane-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["cloud-controller-app-cred"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cloud-controller-reader
  namespace: crossplane-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cloud-controller-app-cred-reader
subjects:
  - kind: ServiceAccount
    name: cloud-controller-reader
    namespace: kube-system
---
# ---------------------------------------------------------------------------
# SecretStore: reads from crossplane-system using the kube-system SA.
# ---------------------------------------------------------------------------
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: crossplane-secrets
  namespace: kube-system
spec:
  provider:
    kubernetes:
      remoteNamespace: crossplane-system
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: cloud-controller-reader
---
# ---------------------------------------------------------------------------
# ExternalSecret: renders clouds.yaml from the application credential.
#
# The resulting Secret (cloud-controller-clouds) in kube-system contains:
#   clouds.yaml — OpenStack clouds.yaml with application credential auth
#
# Sveltos ClusterProfiles reference this secret and push it to child clusters'
# kube-system namespace, where the CCM and CSI charts mount it.
# ---------------------------------------------------------------------------
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloud-controller-clouds
  namespace: kube-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: crossplane-secrets
    kind: SecretStore
  target:
    name: cloud-controller-clouds
    creationPolicy: Owner
    template:
      engineVersion: v2
      # IMPORTANT: This Secret is consumed by Sveltos as a policyRefs source,
      # NOT mounted directly. Sveltos requires two things:
      #   1. The Secret TYPE must be addons.projectsveltos.io/cluster-profile,
      #      otherwise it is rejected with "unsupported secret type".
      #   2. Each data value is treated as a Kubernetes MANIFEST to deploy into
      #      the matching child clusters — it is NOT copied verbatim. So we do
      #      NOT store the raw clouds.yaml here; instead we store the full
      #      definition of the *target* Opaque Secret that the CCM/CSI charts
      #      mount in the child cluster's kube-system (key clouds.yaml).
      type: addons.projectsveltos.io/cluster-profile
      data:
        secret.yaml: |
          apiVersion: v1
          kind: Secret
          metadata:
            name: cloud-controller-clouds
            namespace: kube-system
          type: Opaque
          stringData:
            # The CCM and Cinder CSI binaries read an INI cloud.conf (NOT YAML).
            # cloud.conf delegates auth to clouds.yaml via use-clouds=true. Both
            # charts MUST be pointed at this file (secret.filename: cloud.conf);
            # pointing them at clouds.yaml fails with
            # "Failed to read OpenStack configuration file: 1:1: expected section header"
            # because the binary tries to INI-parse the YAML.
            cloud.conf: |
              [Global]
              use-clouds=true
              clouds-file=/etc/config/clouds.yaml
              cloud=openstack
              tls-insecure=true

              [LoadBalancer]
              enabled=true
              floating-network-id=1cfd69da-057c-4748-a0d4-de5b0ca77db2
              create-monitor=true
              lb-provider=ovn
              lb-method=SOURCE_IP_PORT
            clouds.yaml: |
              clouds:
                openstack:
                  auth:
                    auth_url: https://keystone.rpcu.vpn
                    application_credential_id: "64d11fabde71487d91065edbfbb70280"
                    application_credential_secret: "{{ .applicationCredentialSecret }}"
                  region_name: hetzner
                  verify: false
                  interface: public
                  identity_api_version: 3
  data:
    - secretKey: applicationCredentialSecret
      remoteRef:
        key: cloud-controller-app-cred
        property: attribute.secret
