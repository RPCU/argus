# SecretStore in mgmt namespace that reads from crossplane-system.
# Used by the multi-project ExternalSecret below to aggregate
# per-project ApplicationCredential connection secrets into a single
# clouds.yaml Secret for Sveltos to push to workload clusters.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: crossplane-secrets
  namespace: mgmt
spec:
  provider:
    kubernetes:
      remoteNamespace: crossplane-system
      auth:
        serviceAccount:
          name: es-reader
          namespace: crossplane-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: es-reader
  namespace: crossplane-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: es-reader
  namespace: crossplane-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: es-reader
  namespace: crossplane-system
subjects:
  - kind: ServiceAccount
    name: es-reader
    namespace: crossplane-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: es-reader
