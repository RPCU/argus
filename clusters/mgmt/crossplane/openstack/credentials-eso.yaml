apiVersion: v1
kind: ServiceAccount
metadata:
  name: crossplane-openstack-reader
  namespace: crossplane-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: capo-variables-reader
  namespace: capo-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["capo-variables"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: crossplane-openstack-capo-variables-reader
  namespace: capo-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: capo-variables-reader
subjects:
  - kind: ServiceAccount
    name: crossplane-openstack-reader
    namespace: crossplane-system
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: capo-system-secrets
  namespace: crossplane-system
spec:
  provider:
    kubernetes:
      remoteNamespace: capo-system
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: crossplane-openstack-reader
---
# Renders the provider-openstack credential secret (config.json) from the
# admin clouds.yaml stored in capo-variables.
#
# Uses ESO's fromYaml template function to parse the YAML clouds.yaml value
# and extract the auth fields into the flat JSON dict that provider-openstack
# expects.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: crossplane-provider-openstack
  namespace: crossplane-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: capo-system-secrets
    kind: SecretStore
  target:
    name: crossplane-provider-openstack
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        config.json: |
          {{- $clouds := fromYaml .clouds_yaml -}}
          {{- $auth := index $clouds "clouds" "openstack" "auth" -}}
          {{- $region := index $clouds "clouds" "openstack" "region_name" -}}
          {
            "auth_url": {{ $auth.auth_url | quote }},
            "user_name": {{ $auth.username | quote }},
            "password": {{ $auth.password | quote }},
            "tenant_name": {{ $auth.project_name | quote }},
            "user_domain_name": {{ $auth.user_domain_name | quote }},
            "region": {{ $region | quote }},
            "insecure": "true",
            "endpoint_type": "public"
          }
  data:
    - secretKey: clouds_yaml
      remoteRef:
        key: capo-variables
        property: clouds.yaml
