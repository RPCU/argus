apiVersion: v1
kind: ServiceAccount
metadata:
  name: crossplane-openstack-reader
  namespace: crossplane-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: capo-variables-reader
  namespace: capo-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["capo-variables"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: crossplane-openstack-capo-variables-reader
  namespace: capo-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: capo-variables-reader
subjects:
  - kind: ServiceAccount
    name: crossplane-openstack-reader
    namespace: crossplane-system
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: capo-system-secrets
  namespace: crossplane-system
spec:
  provider:
    kubernetes:
      remoteNamespace: capo-system
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: crossplane-openstack-reader
---
# Renders the provider-openstack credential secret (config.json) from the
# admin clouds.yaml stored in capo-variables.
#
# ESO remoteRef.property extracts nested YAML fields from the clouds.yaml
# value, and the template reassembles them into the flat JSON dict that
# provider-openstack expects.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: crossplane-provider-openstack
  namespace: crossplane-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: capo-system-secrets
    kind: SecretStore
  target:
    name: crossplane-provider-openstack
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        config.json: |
          {
            "auth_url": "{{ .auth_url }}",
            "username": "{{ .username }}",
            "password": "{{ .password }}",
            "project_name": "{{ .project_name }}",
            "user_domain_name": "{{ .user_domain_name }}",
            "project_domain_name": "{{ .project_domain_name }}",
            "region_name": "{{ .region_name }}",
            "interface": "public",
            "identity_api_version": "3"
          }
  data:
    - secretKey: auth_url
      remoteRef:
        key: capo-variables
        property: clouds.openstack.auth.auth_url
    - secretKey: username
      remoteRef:
        key: capo-variables
        property: clouds.openstack.auth.username
    - secretKey: password
      remoteRef:
        key: capo-variables
        property: clouds.openstack.auth.password
    - secretKey: project_name
      remoteRef:
        key: capo-variables
        property: clouds.openstack.auth.project_name
    - secretKey: user_domain_name
      remoteRef:
        key: capo-variables
        property: clouds.openstack.auth.user_domain_name
    - secretKey: project_domain_name
      remoteRef:
        key: capo-variables
        property: clouds.openstack.auth.project_domain_name
    - secretKey: region_name
      remoteRef:
        key: capo-variables
        property: clouds.openstack.region_name
