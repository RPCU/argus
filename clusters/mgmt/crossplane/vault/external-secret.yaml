apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vault-creds
  namespace: crossplane-system
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: vault-creds
    template:
      engineVersion: v2
      data:
        credentials: |
          {
           "auth_login": {
             "path": "auth/approle/login",
             "parameters": {
               "role_id": "{{ .roleid }}",
               "secret_id": "{{ .secretid }}"
             }
           }
          }
  data:
    # The `vault-backend` ClusterSecretStore points at the `secrets-mgmt` KV-v2
    # mount, so the key is just the secret path under that mount
    # (secrets-mgmt/data/crossplane).
    - secretKey: roleid
      remoteRef:
        key: crossplane
        property: role-id
    - secretKey: secretid
      remoteRef:
        key: crossplane
        property: secret-id
