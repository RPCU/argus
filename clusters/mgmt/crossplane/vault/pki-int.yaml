# Vault PKI intermediate CA, chained under the cert-manager `root-mgmt` root CA.
#
# This is the mgmt-side, cluster-agnostic HALF of the per-cluster cert-manager
# add-on (infrastructure/sveltos/clusterprofiles/cert-manager.yaml). It stands up
# a SINGLE shared intermediate CA inside the mgmt Vault (`pki-int` mount). The
# Sveltos add-on then creates, per opt-in workload cluster, a Vault PKI *Role*
# on THIS mount whose `allowedDomains` is locked to that cluster's OWN subdomain
# (`<cluster>.rpcu.lan`) — so every cluster's cert-manager signs against the same
# intermediate, but Vault itself refuses to mint a cert whose CN/SAN falls
# outside the cluster's subdomain. One compromised cluster therefore cannot
# usurp another cluster's subdomain, even though they share one intermediate.
#
# Trust chain:
#   root-mgmt (cert-manager selfSigned CA, clusters/mgmt/cert-manager-issuer)
#     └─ signs → pki-int intermediate (this file, in Vault)
#          └─ signs → per-cluster leaf certs (allowedDomains: <cluster>.rpcu.lan)
#
# Enable the PKI secrets engine at pki-int (the intermediate CA mount).
# maxLeaseTtlSeconds caps every cert this mount can ever issue (incl. the
# intermediate itself — 5 years). Also automatically creates the mount.
apiVersion: vault.vault.upbound.io/v1alpha1
kind: Mount
metadata:
  name: pki-int
spec:
  forProvider:
    path: pki-int
    type: pki
    description: Intermediate CA chained under the cert-manager root-mgmt root
    maxLeaseTtlSeconds: 157680000
  providerConfigRef:
    name: default
---
# Request Vault to generate the intermediate key and CSR, then sign it using
# the cert-manager managed root-mgmt CA. This pattern follows the flux-mgmt
# approach where the existing CA hierarchy is used to sign the intermediate.
apiVersion: pki.vault.upbound.io/v1alpha1
kind: SecretBackendIntermediateCertRequest
metadata:
  name: pki-int
spec:
  forProvider:
    # Reference the pki-int mount created above
    backendRef:
      name: pki-int
    # Sign using existing root-mgmt CA chain rather than Vault's internal root
    type: internal
    commonName: pki-int.mgmt.rpcu.lan Intermediate CA
    keyType: rsa
    keyBits: 4096
    # Sign using root-mgmt CA using crossplane-provider-vault for signature
    # The intermediate will need to be signed manually using the root-mgmt CA
    # generated by cert-manager in the mgmt cluster
  writeConnectionSecretToRef:
    name: pki-int-intermediate
    namespace: crossplane-system
  providerConfigRef:
    name: default
---
# Publish the issuing-CA and CRL distribution URLs advertised in issued certs.
apiVersion: pki.vault.upbound.io/v1alpha1
kind: SecretBackendConfigUrls
metadata:
  name: pki-int
spec:
  forProvider:
    backendRef:
      name: pki-int
    issuingCertificates:
      - https://vault.mgmt.rpcu.lan/v1/pki-int/ca
    crlDistributionPoints:
      - https://vault.mgmt.rpcu.lan/v1/pki-int/crl
  providerConfigRef:
    name: default
