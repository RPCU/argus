# Grafana OIDC application on the shared Zitadel instance, managed by the mgmt
# cluster's Crossplane. Writes its client credentials into the grafana-oidc-conn
# connection secret (monitoring) with native key names (attribute.client_id /
# attribute.client_secret). Grafana consumes them via env vars.
#
# orgId / projectId are referenced by literal external ID:
#   org rpcu               = 369994019545117645
#   project administration = 370001231734928333
apiVersion: application.zitadel.didactiklabs.io/v1alpha1
kind: Oidc
metadata:
  name: grafana
spec:
  forProvider:
    accessTokenRoleAssertion: true
    accessTokenType: OIDC_TOKEN_TYPE_BEARER
    additionalOrigins: []
    appType: OIDC_APP_TYPE_WEB
    authMethodType: OIDC_AUTH_METHOD_TYPE_BASIC
    clockSkew: 0s
    devMode: false
    grantTypes:
      - OIDC_GRANT_TYPE_AUTHORIZATION_CODE
    idTokenRoleAssertion: true
    idTokenUserinfoAssertion: true
    name: grafana
    orgId: "369994019545117645"
    postLogoutRedirectUris:
      - https://grafana.mgmt.rpcu.lan/login
    projectId: "370001231734928333"
    redirectUris:
      - https://grafana.mgmt.rpcu.lan/login/generic_oauth
    responseTypes:
      - OIDC_RESPONSE_TYPE_CODE
    skipNativeAppSuccessPage: false
    version: OIDC_VERSION_1_0
  writeConnectionSecretToRef:
    name: grafana-oidc-conn
    namespace: monitoring
