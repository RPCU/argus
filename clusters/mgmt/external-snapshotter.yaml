apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-snapshotter
  namespace: flux-system
spec:
  interval: 10m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./infrastructure/external-snapshotter/controller
  prune: true
  wait: true
  timeout: 5m
  # The snapshot-controller is non-functional (and won't report Ready) until the
  # VolumeSnapshot CRDs exist.
  dependsOn:
    - name: external-snapshotter-crds
