# Grafana Operator — enables Dashboard as a Service (DaaS) on mgmt.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana-operator
  namespace: flux-system
spec:
  interval: 10m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./infrastructure/grafana-operator
  prune: true
  wait: true
  timeout: 10m
  dependsOn:
    - name: monitoring
