apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: openstack-ccm
  namespace: flux-system
spec:
  interval: 10m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./infrastructure/openstack-ccm
  prune: true
  wait: true
  timeout: 5m
  # The CCM mounts the cloud-config secret rendered by openstack-ccm-identity.
  # That Kustomization is wait:false (it can't be Ready until the manual
  # capo-variables secret exists), so we depend on it only for apply ordering;
  # the CCM Pods will CrashLoop/wait until the secret appears, which is fine.
  dependsOn:
    - name: openstack-ccm-identity
  patches:
    - patch: |
        apiVersion: helm.toolkit.fluxcd.io/v2
        kind: HelmRelease
        metadata:
          name: openstack-cloud-controller-manager
        spec:
          values:
            cluster:
              name: mgmt
      target:
        kind: HelmRelease
        name: openstack-cloud-controller-manager
