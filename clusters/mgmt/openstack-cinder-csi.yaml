apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: openstack-cinder-csi
  namespace: flux-system
spec:
  interval: 10m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./infrastructure/openstack-cinder-csi
  prune: true
  wait: true
  timeout: 5m
  # The cinder-csi plugin mounts the cloud-config secret rendered by
  # openstack-ccm-identity (same secret the OCCM uses). Its csi-snapshotter
  # sidecar also needs the VolumeSnapshot CRDs registered.
  dependsOn:
    - name: openstack-ccm-identity
    - name: external-snapshotter-crds
