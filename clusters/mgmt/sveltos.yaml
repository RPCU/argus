apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sveltos
  namespace: flux-system
spec:
  interval: 10m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./infrastructure/sveltos
  prune: true
  timeout: 5m
  # kgateway provides the "https" Gateway the dashboard HTTPRoute attaches to.
  dependsOn:
    - name: kgateway
  # wait: false — the dashboard HelmRelease ships with a placeholder OIDC
  # clientId (see infrastructure/sveltos/dashboard.yaml); don't health-gate the
  # whole Kustomization on it until the Zitadel "kubernetes" client ID is set.
  wait: false
