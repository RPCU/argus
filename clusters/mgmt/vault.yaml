apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: vault
  namespace: flux-system
spec:
  interval: 10m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./infrastructure/vault
  prune: true
  timeout: 5m
  dependsOn:
    # The HTTPRoute's parent is the shared `https` Gateway (kgateway), which in
    # turn consumes the rpcu-lan-wildcard-tls cert from cert-manager-issuer.
    - name: kgateway
    # Vault's dataStorage PVC requests the `cinder-delete` StorageClass, which is
    # created by the Cinder CSI driver.
    - name: openstack-cinder-csi
