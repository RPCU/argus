apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 10m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./infrastructure/cilium
  prune: false
  patches:
    - patch: |
        apiVersion: helm.toolkit.fluxcd.io/v2
        kind: HelmRelease
        metadata:
          name: cilium
        spec:
          values:
            k8sServiceHost: "10.0.0.5"
            k8sServicePort: 6443
            extraArgs:
              - --devices=eno1.4000
              - --direct-routing-device=eno1.4000
            # This baremetal cluster hosts nested KVM/QEMU OpenStack VMs.
            # Restrict socket-LB to the host namespace so the host's eBPF socket
            # load-balancer does not interfere with connections made inside the
            # guest VMs. Ordinary clusters (e.g. mgmt) keep the base default
            # (false) so socket-LB works inside pod netns.
            socketLB:
              hostNamespaceOnly: true
      target:
        kind: HelmRelease
        name: cilium
    - patch: |
        apiVersion: "cilium.io/v2alpha1"
        kind: CiliumL2AnnouncementPolicy
        metadata:
          name: internal
        spec:
          interfaces:
            - "eno1.4000"
      target:
        kind: CiliumL2AnnouncementPolicy
        name: internal
    - patch: |
        apiVersion: cilium.io/v2
        kind: CiliumLoadBalancerIPPool
        metadata:
          name: internal
        spec:
          allowFirstLastIPs: "Yes"
          blocks:
            - start: 10.0.0.240
              stop: 10.0.0.253
          disabled: false
      target:
        kind: CiliumLoadBalancerIPPool
        name: internal
