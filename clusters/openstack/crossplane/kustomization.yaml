# OpenStack-cluster concrete Crossplane resources (the instances that consume the
# shared bases infrastructure/crossplane-openstack and infrastructure/crossplane-zitadel):
#   - openstack/  OpenStack managed/composite resources (networks, routers,
#                 flavors, groups, projects, security groups, DNS zone) + the
#                 ClusterProviderConfig pointing at the live OpenStack creds. (ns yaook)
#   - zitadel/    OpenStack-cluster Zitadel Oidc apps (openstack, netbird). (ns zitadel)
#
# The cloud-controller user/roles/app-cred + ESO now live on the mgmt cluster
# (clusters/mgmt/crossplane/) because Sveltos runs on mgmt and needs access
# to the rendered clouds.yaml Secret.
resources:
  - openstack/
  - zitadel/
