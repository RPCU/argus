# OpenStack-cluster Zitadel OIDC applications. These are concrete instances of
# the shared Zitadel platform (org/projects/roles live in the shared base
# infrastructure/crossplane-zitadel). The connection secrets are written into
# the namespaces that consume them on this cluster (crossplane-system / yaook).
apiVersion: application.zitadel.didactiklabs.io/v1alpha1
kind: Oidc
metadata:
  name: netbird
spec:
  forProvider:
    accessTokenRoleAssertion: false
    accessTokenType: OIDC_TOKEN_TYPE_BEARER
    additionalOrigins: []
    appType: OIDC_APP_TYPE_WEB
    authMethodType: OIDC_AUTH_METHOD_TYPE_BASIC
    clockSkew: 0s
    devMode: false
    grantTypes:
      - OIDC_GRANT_TYPE_AUTHORIZATION_CODE
    idTokenRoleAssertion: false
    idTokenUserinfoAssertion: false
    name: netbird
    orgIdRef:
      name: rpcu
    postLogoutRedirectUris:
      - "*"
    projectIdRef:
      name: administration
    redirectUris:
      - https://netbird.rpcu.io/oauth2/callback
    responseTypes:
      - OIDC_RESPONSE_TYPE_CODE
    skipNativeAppSuccessPage: false
    version: OIDC_VERSION_1_0
  writeConnectionSecretToRef:
    name: netbird-oidc
    namespace: crossplane-system
---
apiVersion: application.zitadel.didactiklabs.io/v1alpha1
kind: Oidc
metadata:
  name: openstack
spec:
  forProvider:
    accessTokenRoleAssertion: false
    accessTokenType: OIDC_TOKEN_TYPE_BEARER
    additionalOrigins: []
    appType: OIDC_APP_TYPE_WEB
    authMethodType: OIDC_AUTH_METHOD_TYPE_BASIC
    clockSkew: 0s
    devMode: false
    grantTypes:
      - OIDC_GRANT_TYPE_AUTHORIZATION_CODE
    idTokenRoleAssertion: false
    idTokenUserinfoAssertion: false
    name: openstack
    orgIdRef:
      name: rpcu
    postLogoutRedirectUris:
      - "*"
    projectIdRef:
      name: administration
    redirectUris:
      - https://os.rpcu.vpn/redirect_uri
      - https://keystone.rpcu.vpn/redirect_uri
      - https://keystone.rpcu.vpn:443/redirect_uri
      - https://keystone.rpcu.vpn/v3/auth/OS-FEDERATION/identity_providers/zitadel/protocols/openid/websso
      - https://keystone.rpcu.vpn/v3/auth/OS-FEDERATION/websso/openid
      - https://os.rpcu.vpn
    responseTypes:
      - OIDC_RESPONSE_TYPE_CODE
    skipNativeAppSuccessPage: false
    version: OIDC_VERSION_1_0
  writeConnectionSecretToRef:
    name: openstack-oidc
    namespace: yaook
---
# Shared kube-apiserver OIDC client for CAPI clusters (the ClusterClass
# "oidc" variable injects --oidc-issuer-url / --oidc-client-id into the
# control-plane apiserver, see infrastructure/cluster-api-templates). This is a
# PUBLIC (native) client using PKCE with NO client secret: the kube-apiserver
# only validates ID tokens against the issuer + clientID and never performs a
# client-credential exchange, and `kubectl oidc-login` (kubelogin) does the auth
# code + PKCE flow from the user's machine. Because there is no secret there is
# intentionally no writeConnectionSecretToRef.
#
# The clientID generated by Zitadel must be copied into each cluster's "oidc"
# variable (clusters/<cluster>/clusters/*.yaml). Lives in the "kubernetes"
# project so the kube-user / kube-admin roles (roles.yaml) assert as groups.
apiVersion: application.zitadel.didactiklabs.io/v1alpha1
kind: Oidc
metadata:
  name: kubernetes
spec:
  forProvider:
    accessTokenRoleAssertion: true
    accessTokenType: OIDC_TOKEN_TYPE_BEARER
    additionalOrigins: []
    appType: OIDC_APP_TYPE_NATIVE
    authMethodType: OIDC_AUTH_METHOD_TYPE_NONE
    clockSkew: 0s
    devMode: false
    grantTypes:
      - OIDC_GRANT_TYPE_AUTHORIZATION_CODE
    idTokenRoleAssertion: true
    idTokenUserinfoAssertion: true
    name: kubernetes
    orgIdRef:
      name: rpcu
    postLogoutRedirectUris:
      - "*"
    projectIdRef:
      name: kubernetes
    redirectUris:
      - http://localhost:8000
      - http://localhost:18000
    responseTypes:
      - OIDC_RESPONSE_TYPE_CODE
    skipNativeAppSuccessPage: false
    version: OIDC_VERSION_1_0
