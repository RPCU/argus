# -----------------------------------------------------------------------------
# Syncs the OpenStack clouds.yaml from the manually-placed capo-variables secret
# (capo-system) into the mgmt namespace as `mgmt-cloud-config`, the secret
# referenced by every Cluster's hardcoded OpenStackCluster identityRef.
#
# This keeps a single source of truth: you place clouds.yaml once in
# capo-variables; CAPO's provider config and the per-cluster identityRef both
# derive from it.
# -----------------------------------------------------------------------------
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mgmt-cloud-config
  namespace: mgmt
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: capo-system-secrets
    kind: SecretStore
  target:
    name: mgmt-cloud-config
    creationPolicy: Owner
  data:
    - secretKey: clouds.yaml
      remoteRef:
        key: capo-variables
        property: clouds.yaml
