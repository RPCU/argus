# Renders the CephFS CSI user credentials (csi-cephfs-secret) from the mgmt
# Vault via the `vault-backend` ClusterSecretStore.
#
# The upstream ceph-csi-cephfs StorageClass expects a secret with `adminID` +
# `adminKey` (a Ceph user name + its cephx key). These are the CephFS CephClient
# credentials created by Rook on the openstack cluster
# (infrastructure/rook/configs/openstack-clients.yaml `cephfs` client → the
# `rook-ceph-client-cephfs` Secret). Copy that key into the mgmt Vault KV path
# once, out of band:
#
#   userID:  client name Rook generated for the `cephfs` CephClient
#            (e.g. `cephfs` → Ceph user `client.cephfs`; ceph-csi wants the bare
#            name WITHOUT the `client.` prefix, i.e. `cephfs`)
#   userKey: the cephx key from the rook-ceph-client-cephfs Secret
#
#   vault kv put secrets-<cluster>/ceph-csi userID=cephfs userKey=<cephx-key>
#
# `vault-backend` on mgmt points at the `secrets-mgmt` KV-v2 mount; on workload
# clusters the Sveltos vault-auth add-on provisions a `secrets-<cluster>` mount
# with the same ClusterSecretStore name. So this same manifest works on every
# cluster — only the underlying Vault mount differs.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: csi-cephfs-secret
  namespace: ceph-csi-cephfs
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: csi-cephfs-secret
    creationPolicy: Owner
  data:
    - secretKey: adminID
      remoteRef:
        key: ceph-csi
        property: userID
    - secretKey: adminKey
      remoteRef:
        key: ceph-csi
        property: userKey
