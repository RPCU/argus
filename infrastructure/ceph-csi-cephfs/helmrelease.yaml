apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ceph-csi-cephfs
  namespace: ceph-csi-cephfs
spec:
  interval: 5m
  releaseName: ceph-csi-cephfs
  chart:
    spec:
      chart: ceph-csi-cephfs
      version: "3.15.0"
      sourceRef:
        kind: HelmRepository
        name: ceph-csi
        namespace: ceph-csi-cephfs
  # Base values from the generated ConfigMap. Per-cluster overrides (the
  # csiConfig mon list + clusterID) are appended as a SECOND valuesFrom by the
  # consumer:
  #   - mgmt: clusters/mgmt/ceph-csi-cephfs.yaml patches this HelmRelease.
  #   - workload clusters: the Sveltos ceph-csi-cephfs ClusterProfile appends a
  #     templated ceph-csi-cephfs-workload-values ConfigMap.
  valuesFrom:
    - kind: ConfigMap
      name: ceph-csi-cephfs-values
