packetizationLayerPMTUDMode: native
l2announcements:
  enabled: true
socketLB:
  # Default false: socket-LB runs inside pod netns, required for kube-proxy-free
  # ClusterIP resolution on ordinary clusters (e.g. mgmt). The baremetal
  # openstack cluster overrides this to true (it hosts nested KVM/QEMU VMs and
  # must not let host socket-LB interfere with guest connections) — see
  # clusters/openstack/cilium.yaml.
  hostNamespaceOnly: false
kubeProxyReplacement: true
envoy:
  enabled: false
cni:
  exclusive: false
ipam:
  operator:
    clusterPoolIPv4PodCIDRList:
      - "10.244.0.0/16"
    clusterPoolIPv4MaskSize: 23
