apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cluster-api-operator
spec:
  interval: 5m
  chart:
    spec:
      chart: cluster-api-operator
      version: "0.28.0"
      sourceRef:
        kind: HelmRepository
        name: cluster-api-operator
        namespace: capi-operator-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  valuesFrom:
    - kind: ConfigMap
      name: cluster-api-operator-values
