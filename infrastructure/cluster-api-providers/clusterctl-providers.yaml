# clusterctl Provider inventory CRs.
# These are SEPARATE from the operator.cluster.x-k8s.io/v1alpha2 CRs that the
# Cluster API Operator uses to install providers. clusterctl move discovers
# providers on the target cluster by looking for clusterctl.cluster.x-k8s.io/v1alpha3
# Provider resources — without them, clusterctl move fails with "provider not found".
apiVersion: v1
kind: List
items:
  - apiVersion: clusterctl.cluster.x-k8s.io/v1alpha3
    kind: Provider
    metadata:
      name: cluster-api
      namespace: capi-system
      labels:
        cluster.x-k8s.io/provider: cluster-api
        clusterctl.cluster.x-k8s.io: ""
        clusterctl.cluster.x-k8s.io/core: inventory
    providerName: cluster-api
    type: CoreProvider
    # renovate: datasource=github-releases depName=kubernetes-sigs/cluster-api
    version: v1.13.2
  - apiVersion: clusterctl.cluster.x-k8s.io/v1alpha3
    kind: Provider
    metadata:
      name: bootstrap-kubeadm
      namespace: capi-kubeadm-bootstrap-system
      labels:
        cluster.x-k8s.io/provider: bootstrap-kubeadm
        clusterctl.cluster.x-k8s.io: ""
        clusterctl.cluster.x-k8s.io/core: inventory
    providerName: kubeadm
    type: BootstrapProvider
    # renovate: datasource=github-releases depName=kubernetes-sigs/cluster-api
    version: v1.13.2
  - apiVersion: clusterctl.cluster.x-k8s.io/v1alpha3
    kind: Provider
    metadata:
      name: control-plane-kubeadm
      namespace: capi-kubeadm-control-plane-system
      labels:
        cluster.x-k8s.io/provider: control-plane-kubeadm
        clusterctl.cluster.x-k8s.io: ""
        clusterctl.cluster.x-k8s.io/core: inventory
    providerName: kubeadm
    type: ControlPlaneProvider
    # renovate: datasource=github-releases depName=kubernetes-sigs/cluster-api
    version: v1.13.2
  - apiVersion: clusterctl.cluster.x-k8s.io/v1alpha3
    kind: Provider
    metadata:
      name: infrastructure-openstack
      namespace: capo-system
      labels:
        cluster.x-k8s.io/provider: infrastructure-openstack
        clusterctl.cluster.x-k8s.io: ""
        clusterctl.cluster.x-k8s.io/core: inventory
    providerName: openstack
    type: InfrastructureProvider
    # renovate: datasource=github-releases depName=kubernetes-sigs/cluster-api-provider-openstack
    version: v0.14.4
  - apiVersion: clusterctl.cluster.x-k8s.io/v1alpha3
    kind: Provider
    metadata:
      name: control-plane-kamaji
      namespace: capi-kamaji-control-plane-system
      labels:
        cluster.x-k8s.io/provider: control-plane-kamaji
        clusterctl.cluster.x-k8s.io: ""
        clusterctl.cluster.x-k8s.io/core: inventory
    providerName: kamaji
    type: ControlPlaneProvider
    # renovate: datasource=github-releases depName=clastix/cluster-api-control-plane-provider-kamaji
    version: v0.20.0
