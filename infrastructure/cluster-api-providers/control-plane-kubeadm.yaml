# Kubeadm control-plane provider — manages KubeadmControlPlane resources.
# ClusterTopology must be enabled for ClusterClass/Topology support.
apiVersion: operator.cluster.x-k8s.io/v1alpha2
kind: ControlPlaneProvider
metadata:
  name: kubeadm
  namespace: capi-kubeadm-control-plane-system
spec:
  version: v1.13.2
  manager:
    featureGates:
      ClusterTopology: true
