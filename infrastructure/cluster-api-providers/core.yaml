# Core Cluster API provider. Must be installed before any other provider;
# the operator requeues the others until this exists.
# ClusterTopology must be enabled for ClusterClass/Topology support.
apiVersion: operator.cluster.x-k8s.io/v1alpha2
kind: CoreProvider
metadata:
  name: cluster-api
  namespace: capi-system
spec:
  # renovate: datasource=github-releases depName=kubernetes-sigs/cluster-api
  version: v1.13.2
  manager:
    featureGates:
      ClusterTopology: true
