# OpenStack infrastructure provider (CAPO).
# configSecret references provider-level variables (e.g. clouds.yaml). The
# secret is populated by External Secrets (see externalsecret-capo.yaml).
# Per-cluster OpenStack credentials are referenced separately by each Cluster
# via its OpenStackCluster identityRef secret.
apiVersion: operator.cluster.x-k8s.io/v1alpha2
kind: InfrastructureProvider
metadata:
  name: openstack
  namespace: capo-system
spec:
  # renovate: datasource=github-releases depName=kubernetes-sigs/cluster-api-provider-openstack
  version: v0.14.6
  configSecret:
    name: capo-variables
    namespace: capo-system
