# -----------------------------------------------------------------------------
# ExternalSecret backend for syncing the OpenStack clouds.yaml into the mgmt
# namespace.
#
# Single source of truth: the `capo-variables` secret is placed MANUALLY in the
# capo-system namespace (see infrastructure/cluster-api-providers/README.md). To
# avoid maintaining the same clouds.yaml twice, this SecretStore lets External
# Secrets read it from capo-system (same cluster, cross-namespace via the
# Kubernetes provider) and the ExternalSecret in externalsecret-identity.yaml
# projects it into mgmt as `mgmt-cloud-config` for CAPO's identityRef.
#
# Auth: the `capo-identity-reader` ServiceAccount (in mgmt) authenticates to the
# local API; RBAC granting it read access to the capo-variables secret lives in
# capo-system (Role + RoleBinding below).
# -----------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: capo-identity-reader
  namespace: mgmt
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: capo-variables-reader
  namespace: capo-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["capo-variables"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: capo-variables-reader
  namespace: capo-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: capo-variables-reader
subjects:
  - kind: ServiceAccount
    name: capo-identity-reader
    namespace: mgmt
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: capo-system-secrets
  namespace: mgmt
spec:
  provider:
    kubernetes:
      remoteNamespace: capo-system
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
          namespace: mgmt
      auth:
        serviceAccount:
          name: capo-identity-reader
