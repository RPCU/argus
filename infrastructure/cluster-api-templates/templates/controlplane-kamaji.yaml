# -----------------------------------------------------------------------------
# Control plane template (KamajiControlPlane).
#
# Kamaji runs the tenant Kubernetes control plane (API server, controller
# manager, scheduler) as pods inside the management cluster — no dedicated
# control-plane VMs are needed. The etcd state is stored in the Kamaji-managed
# datastore.
#
# IMMUTABILITY: KamajiControlPlaneTemplate.spec.template.spec is immutable
# once referenced by a ClusterClass. To change anything here, create a NEW
# template with a bumped version suffix (e.g. -v2), point the ClusterClass
# controlPlane.templateRef at it, and let the topology controller reconcile.
# -----------------------------------------------------------------------------
apiVersion: controlplane.cluster.x-k8s.io/v1alpha2
kind: KamajiControlPlaneTemplate
metadata:
  name: openstack-kamaji-control-plane-v1
  namespace: mgmt
spec:
  template:
    spec:
      dataStoreName: default
      kubelet:
        preferredAddressTypes:
          - InternalIP
          - ExternalIP
          - Hostname
      network:
        serviceType: LoadBalancer
      addons:
        coreDNS: {}
        kubeProxy: {}
