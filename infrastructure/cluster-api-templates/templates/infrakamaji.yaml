# -----------------------------------------------------------------------------
# openstack-kamaji-cluster-v1
#
# Original Kamaji OpenStackClusterTemplate. RETAINED only for rotation to -v2.
# Contains apiServerFixedIP: "" which conflicts with the Kamaji control plane
# provider: it sets apiServerFixedIP at runtime, then the CAPI topology
# controller tries to revert it via SSA dry-run, which CAPO's admission webhook
# blocks ("spec: Forbidden: cannot be modified"). Delete -v1 once -v2 is
# confirmed working.
# -----------------------------------------------------------------------------
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: OpenStackClusterTemplate
metadata:
  name: openstack-kamaji-cluster-v1
  namespace: mgmt
spec:
  template:
    spec:
      apiServerLoadBalancer:
        enabled: false
      disableAPIServerFloatingIP: true
      apiServerFixedIP: ""
      identityRef:
        name: mgmt-cloud-config
        cloudName: openstack
      managedSecurityGroups:
        allowAllInClusterTraffic: true
        allNodesSecurityGroupRules:
          - description: Allow SSH ingress from anywhere
            direction: ingress
            etherType: IPv4
            name: SSH ingress
            portRangeMax: 22
            portRangeMin: 22
            protocol: tcp
            remoteIPPrefix: 0.0.0.0/0
          - description: Allow DNS egress (UDP) to anywhere
            direction: egress
            etherType: IPv4
            name: DNS egress (UDP)
            portRangeMax: 53
            portRangeMin: 53
            protocol: udp
            remoteIPPrefix: 0.0.0.0/0
          - description: Allow DNS egress (TCP) to anywhere
            direction: egress
            etherType: IPv4
            name: DNS egress (TCP)
            portRangeMax: 53
            portRangeMin: 53
            protocol: tcp
            remoteIPPrefix: 0.0.0.0/0
          - description: Cilium VXLAN overlay (node-to-node)
            direction: ingress
            etherType: IPv4
            name: Cilium VXLAN
            portRangeMax: 8472
            portRangeMin: 8472
            protocol: udp
            remoteManagedGroups:
              - controlplane
              - worker
          - description: Cilium health checks (node-to-node)
            direction: ingress
            etherType: IPv4
            name: Cilium health (TCP 4240)
            portRangeMax: 4240
            portRangeMin: 4240
            protocol: tcp
            remoteManagedGroups:
              - controlplane
              - worker
          - description: Hubble relay/peer (node-to-node)
            direction: ingress
            etherType: IPv4
            name: Cilium Hubble (TCP 4244)
            portRangeMax: 4244
            portRangeMin: 4244
            protocol: tcp
            remoteManagedGroups:
              - controlplane
              - worker
          - description: ICMP between nodes (health/path MTU)
            direction: ingress
            etherType: IPv4
            name: ICMP (node-to-node)
            protocol: icmp
            remoteManagedGroups:
              - controlplane
              - worker
---
# -----------------------------------------------------------------------------
# openstack-kamaji-cluster-v3
#
# Identical to -v2 plus an ingress rule opening the kubelet API port (10250)
# from anywhere (0.0.0.0/0).
#
# WHY (Kamaji-specific): with the Kamaji control plane the kube-apiserver runs
# as pods INSIDE the management cluster, NOT as OpenStack VMs in the workload
# cluster's managed security groups. `kubectl logs`/`exec`/`attach`/`port-forward`
# and `kubectl top node` all proxy from the apiserver to each node's kubelet on
# TCP 10250 (read/streaming + metrics). CAPO's default managed SG only opens
# 10250 to the managed controlplane/worker groups (i.e. node-to-node), so the
# Kamaji apiserver pods — whose source IP belongs to the mgmt cluster's network,
# not the workload SGs — are dropped. The result is the classic symptom:
# `kubectl logs`/`exec` against a Kamaji-CP cluster hang/time out
# ("error dialing backend: ... i/o timeout") while the API itself works.
#
# The rule below opens kubelet 10250 from 0.0.0.0/0 (per request). Source can't
# be scoped to the Kamaji CP cleanly (its egress IP depends on the mgmt cluster's
# SNAT/floating-IP), and remoteManagedGroups can't reference a group outside this
# cluster — so the pragmatic fix is to open it from anywhere. The kubelet still
# requires authenticated+authorized TLS (webhook auth), so this exposes the port
# but not unauthenticated access.
#
# IMMUTABILITY: this is a NEW template (not an in-place edit of -v2). The
# ClusterClass infrastructure.templateRef is repointed to -v3; -v2 is deleted
# once the rotation is confirmed (see README "-vN rotation workflow"). An
# OpenStackClusterTemplate rotation reconciles the SGs onto the live
# OpenStackCluster without rolling machines.
# -----------------------------------------------------------------------------
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: OpenStackClusterTemplate
metadata:
  name: openstack-kamaji-cluster-v3
  namespace: mgmt
spec:
  template:
    spec:
      apiServerLoadBalancer:
        enabled: false
      disableAPIServerFloatingIP: true
      identityRef:
        name: mgmt-cloud-config
        cloudName: openstack
      managedSecurityGroups:
        # See -v1/-v2 above for the rationale behind allowAllInClusterTraffic
        # and the Cilium data-plane rules. -v3 only ADDS the kubelet 10250 rule.
        allowAllInClusterTraffic: true
        allNodesSecurityGroupRules:
          - description: Allow SSH ingress from anywhere
            direction: ingress
            etherType: IPv4
            name: SSH ingress
            portRangeMax: 22
            portRangeMin: 22
            protocol: tcp
            remoteIPPrefix: 0.0.0.0/0
          - description: Allow DNS egress (UDP) to anywhere
            direction: egress
            etherType: IPv4
            name: DNS egress (UDP)
            portRangeMax: 53
            portRangeMin: 53
            protocol: udp
            remoteIPPrefix: 0.0.0.0/0
          - description: Allow DNS egress (TCP) to anywhere
            direction: egress
            etherType: IPv4
            name: DNS egress (TCP)
            portRangeMax: 53
            portRangeMin: 53
            protocol: tcp
            remoteIPPrefix: 0.0.0.0/0
          # ---------------------------------------------------------------
          # Cilium data-plane between nodes. (See -v1 for full rationale.)
          # ---------------------------------------------------------------
          - description: Cilium VXLAN overlay (node-to-node)
            direction: ingress
            etherType: IPv4
            name: Cilium VXLAN
            portRangeMax: 8472
            portRangeMin: 8472
            protocol: udp
            remoteManagedGroups:
              - controlplane
              - worker
          - description: Cilium health checks (node-to-node)
            direction: ingress
            etherType: IPv4
            name: Cilium health (TCP 4240)
            portRangeMax: 4240
            portRangeMin: 4240
            protocol: tcp
            remoteManagedGroups:
              - controlplane
              - worker
          - description: Hubble relay/peer (node-to-node)
            direction: ingress
            etherType: IPv4
            name: Cilium Hubble (TCP 4244)
            portRangeMax: 4244
            portRangeMin: 4244
            protocol: tcp
            remoteManagedGroups:
              - controlplane
              - worker
          - description: ICMP between nodes (health/path MTU)
            direction: ingress
            etherType: IPv4
            name: ICMP (node-to-node)
            protocol: icmp
            remoteManagedGroups:
              - controlplane
              - worker
          # ---------------------------------------------------------------
          # Kubelet API (10250) — REQUIRED for the Kamaji hosted control
          # plane. The apiserver runs as pods in the MGMT cluster and proxies
          # logs/exec/attach/port-forward/top to each node's kubelet on 10250.
          # Opened from 0.0.0.0/0 because the Kamaji CP egress IP is outside
          # this cluster's managed SGs (can't use remoteManagedGroups). The
          # kubelet still enforces authenticated+authorized TLS.
          # ---------------------------------------------------------------
          - description: Kubelet API (Kamaji control-plane logs/exec/port-forward)
            direction: ingress
            etherType: IPv4
            name: Kubelet API (TCP 10250)
            portRangeMax: 10250
            portRangeMin: 10250
            protocol: tcp
            remoteIPPrefix: 0.0.0.0/0
---
# -----------------------------------------------------------------------------
# openstack-kamaji-cluster-v4
#
# Identical to -v3 plus the Kubernetes NodePort-range ingress rule (TCP
# 30000-32767 from 0.0.0.0/0).
#
# WHY: external `type: LoadBalancer` Services are provisioned by the OpenStack
# CCM as Octavia (OVN provider) load balancers whose VIP DNATs incoming traffic
# to a member = <node IP>:<nodePort>, and whose health monitors probe the same
# <node IP>:<nodePort>. CAPO's default managed SG only opens the NodePort range
# node-to-node (remoteManagedGroups), NOT from the Octavia VIP / health-monitor
# source. So the probes (and real client traffic) are dropped by the workload
# SG: the Octavia LB provisions fine (provisioning_status ACTIVE, clean logs)
# but the pool members sit at operating_status: ERROR and no traffic flows.
# Symptom seen on the production (Kamaji) cluster's two-port kgateway `https`
# Gateway LB. The kubeadm `openstack-default` class already carries this rule
# (openstack-default-cluster-v2); the Kamaji class was missing it — this closes
# the gap.
#
# Source is 0.0.0.0/0 because the Octavia OVN VIP may forward with the original
# client source IP preserved (lb-method SOURCE_IP_PORT), so member ingress can't
# be scoped to a single LB address (mirrors the openstack-default rationale).
#
# IMMUTABILITY: this is a NEW template (not an in-place edit of -v3). The
# ClusterClass infrastructure.templateRef is repointed to -v4; -v3 is deleted
# once the rotation is confirmed (see README "-vN rotation workflow"). An
# OpenStackClusterTemplate rotation reconciles the SGs onto the live
# OpenStackCluster without rolling machines.
# -----------------------------------------------------------------------------
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: OpenStackClusterTemplate
metadata:
  name: openstack-kamaji-cluster-v4
  namespace: mgmt
spec:
  template:
    spec:
      apiServerLoadBalancer:
        enabled: false
      disableAPIServerFloatingIP: true
      identityRef:
        name: mgmt-cloud-config
        cloudName: openstack
      managedSecurityGroups:
        # See -v1/-v2/-v3 above for the rationale behind allowAllInClusterTraffic,
        # the Cilium data-plane rules, and the Kamaji kubelet 10250 rule. -v4 only
        # ADDS the NodePort-range rule.
        allowAllInClusterTraffic: true
        allNodesSecurityGroupRules:
          - description: Allow SSH ingress from anywhere
            direction: ingress
            etherType: IPv4
            name: SSH ingress
            portRangeMax: 22
            portRangeMin: 22
            protocol: tcp
            remoteIPPrefix: 0.0.0.0/0
          - description: Allow DNS egress (UDP) to anywhere
            direction: egress
            etherType: IPv4
            name: DNS egress (UDP)
            portRangeMax: 53
            portRangeMin: 53
            protocol: udp
            remoteIPPrefix: 0.0.0.0/0
          - description: Allow DNS egress (TCP) to anywhere
            direction: egress
            etherType: IPv4
            name: DNS egress (TCP)
            portRangeMax: 53
            portRangeMin: 53
            protocol: tcp
            remoteIPPrefix: 0.0.0.0/0
          # ---------------------------------------------------------------
          # Cilium data-plane between nodes. (See -v1 for full rationale.)
          # ---------------------------------------------------------------
          - description: Cilium VXLAN overlay (node-to-node)
            direction: ingress
            etherType: IPv4
            name: Cilium VXLAN
            portRangeMax: 8472
            portRangeMin: 8472
            protocol: udp
            remoteManagedGroups:
              - controlplane
              - worker
          - description: Cilium health checks (node-to-node)
            direction: ingress
            etherType: IPv4
            name: Cilium health (TCP 4240)
            portRangeMax: 4240
            portRangeMin: 4240
            protocol: tcp
            remoteManagedGroups:
              - controlplane
              - worker
          - description: Hubble relay/peer (node-to-node)
            direction: ingress
            etherType: IPv4
            name: Cilium Hubble (TCP 4244)
            portRangeMax: 4244
            portRangeMin: 4244
            protocol: tcp
            remoteManagedGroups:
              - controlplane
              - worker
          - description: ICMP between nodes (health/path MTU)
            direction: ingress
            etherType: IPv4
            name: ICMP (node-to-node)
            protocol: icmp
            remoteManagedGroups:
              - controlplane
              - worker
          # ---------------------------------------------------------------
          # Kubelet API (10250) — REQUIRED for the Kamaji hosted control
          # plane. (See -v3 for full rationale.)
          # ---------------------------------------------------------------
          - description: Kubelet API (Kamaji control-plane logs/exec/port-forward)
            direction: ingress
            etherType: IPv4
            name: Kubelet API (TCP 10250)
            portRangeMax: 10250
            portRangeMin: 10250
            protocol: tcp
            remoteIPPrefix: 0.0.0.0/0
          # ---------------------------------------------------------------
          # Kubernetes NodePort range — REQUIRED for external `type:
          # LoadBalancer` Services routed via the OpenStack CCM + Octavia.
          # The Octavia VIP forwards to <node IP>:<nodePort> and health
          # monitors probe the same; without this ingress the managed SG
          # drops it and the LB members sit at operating_status: ERROR.
          # ---------------------------------------------------------------
          - description: Kubernetes NodePort services (Octavia LoadBalancer backends)
            direction: ingress
            etherType: IPv4
            name: NodePort range (TCP)
            portRangeMax: 32767
            portRangeMin: 30000
            protocol: tcp
            remoteIPPrefix: 0.0.0.0/0
---
# -----------------------------------------------------------------------------
# openstack-kamaji-cluster-v5
#
# Identical to -v4 (kubelet 10250 + NodePort range) but with the redundant
# remoteManagedGroups Cilium data-plane rules (VXLAN 8472 / health 4240 /
# Hubble 4244 / ICMP) REMOVED.
#
# WHY: those four rules set remoteManagedGroups: [controlplane, worker] — they
# open ports (and, for ICMP, ALL ICMP) between the managed node security groups.
# But allowAllInClusterTraffic: true ALREADY opens ALL node-to-node traffic on
# every port/protocol between those same groups. Each of those rules therefore
# normalizes to a Neutron rule tuple allowAllInClusterTraffic also creates, and
# on a fresh cluster CAPO POSTs both — the second collides with:
#
#   409 SecurityGroupRuleExists ("Security group rule already exists")
#
# aborting the whole managedSecurityGroups reconcile and wedging the
# OpenStackCluster. Only rules scoped to 0.0.0.0/0 (SSH, DNS egress, NodePort,
# kubelet 10250) are kept — they are NOT covered by the in-cluster allow-all and
# so never collide.
#
# IMMUTABILITY: this is a NEW template (not an in-place edit of -v4). The Kamaji
# ClusterClass infrastructure.templateRef is repointed to -v5; -v4 is deleted
# once the rotation is confirmed (see README "-vN rotation workflow"). An
# OpenStackClusterTemplate rotation reconciles the SGs onto the live
# OpenStackCluster without rolling machines.
# -----------------------------------------------------------------------------
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: OpenStackClusterTemplate
metadata:
  name: openstack-kamaji-cluster-v5
  namespace: mgmt
spec:
  template:
    spec:
      apiServerLoadBalancer:
        enabled: false
      disableAPIServerFloatingIP: true
      identityRef:
        name: mgmt-cloud-config
        cloudName: openstack
      managedSecurityGroups:
        # allowAllInClusterTraffic already opens ALL node-to-node traffic, so the
        # Cilium overlay (VXLAN/health/Hubble/ICMP) is covered without enumerating
        # ports — and enumerating them here would 409 as duplicates. Only rules
        # scoped to 0.0.0.0/0 (not covered by the in-cluster allow-all) remain:
        # SSH, DNS egress, kubelet 10250 (Kamaji CP proxy) and the NodePort range.
        allowAllInClusterTraffic: true
        allNodesSecurityGroupRules:
          - description: Allow SSH ingress from anywhere
            direction: ingress
            etherType: IPv4
            name: SSH ingress
            portRangeMax: 22
            portRangeMin: 22
            protocol: tcp
            remoteIPPrefix: 0.0.0.0/0
          - description: Allow DNS egress (UDP) to anywhere
            direction: egress
            etherType: IPv4
            name: DNS egress (UDP)
            portRangeMax: 53
            portRangeMin: 53
            protocol: udp
            remoteIPPrefix: 0.0.0.0/0
          - description: Allow DNS egress (TCP) to anywhere
            direction: egress
            etherType: IPv4
            name: DNS egress (TCP)
            portRangeMax: 53
            portRangeMin: 53
            protocol: tcp
            remoteIPPrefix: 0.0.0.0/0
          # ---------------------------------------------------------------
          # Kubelet API (10250) — REQUIRED for the Kamaji hosted control
          # plane. (See -v3 for full rationale.)
          # ---------------------------------------------------------------
          - description: Kubelet API (Kamaji control-plane logs/exec/port-forward)
            direction: ingress
            etherType: IPv4
            name: Kubelet API (TCP 10250)
            portRangeMax: 10250
            portRangeMin: 10250
            protocol: tcp
            remoteIPPrefix: 0.0.0.0/0
          # ---------------------------------------------------------------
          # Kubernetes NodePort range — REQUIRED for external `type:
          # LoadBalancer` Services routed via the OpenStack CCM + Octavia.
          # (See -v4 for full rationale.)
          # ---------------------------------------------------------------
          - description: Kubernetes NodePort services (Octavia LoadBalancer backends)
            direction: ingress
            etherType: IPv4
            name: NodePort range (TCP)
            portRangeMax: 32767
            portRangeMin: 30000
            protocol: tcp
            remoteIPPrefix: 0.0.0.0/0
---
# -----------------------------------------------------------------------------
# openstack-kamaji-cluster-v2
#
# Identical to -v1 but WITHOUT apiServerFixedIP. The Kamaji control plane
# provider sets this field at runtime (to the TenantControlPlane's internal
# IP). Including it as "" in the template caused the CAPI topology controller
# to try to revert it on every reconciliation via SSA dry-run, which CAPO's
# admission webhook blocks because the field is immutable after first set.
# IMMUTABILITY: this is a NEW template (not an in-place edit of -v1). The
# ClusterClass infrastructure.templateRef is repointed to -v2; -v1 is deleted
# once the rotation is confirmed (see README "-vN rotation workflow").
# -----------------------------------------------------------------------------
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: OpenStackClusterTemplate
metadata:
  name: openstack-kamaji-cluster-v2
  namespace: mgmt
spec:
  template:
    spec:
      apiServerLoadBalancer:
        enabled: false
      disableAPIServerFloatingIP: true
      identityRef:
        name: mgmt-cloud-config
        cloudName: openstack
      managedSecurityGroups:
        # Permit ALL traffic between cluster nodes on every port/protocol. This
        # is the robust setting for a Cilium cluster: it covers the overlay and
        # every future Cilium feature (encryption, Hubble, etc.) without having
        # to enumerate ports. The explicit allNodesSecurityGroupRules below are
        # kept as documentation of the specific Cilium data-plane ports; with
        # allowAllInClusterTraffic enabled they are redundant but harmless.
        # API server and node-port traffic from outside is still governed by the
        # default managed rules.
        allowAllInClusterTraffic: true
        allNodesSecurityGroupRules:
          - description: Allow SSH ingress from anywhere
            direction: ingress
            etherType: IPv4
            name: SSH ingress
            portRangeMax: 22
            portRangeMin: 22
            protocol: tcp
            remoteIPPrefix: 0.0.0.0/0
          - description: Allow DNS egress (UDP) to anywhere
            direction: egress
            etherType: IPv4
            name: DNS egress (UDP)
            portRangeMax: 53
            portRangeMin: 53
            protocol: udp
            remoteIPPrefix: 0.0.0.0/0
          - description: Allow DNS egress (TCP) to anywhere
            direction: egress
            etherType: IPv4
            name: DNS egress (TCP)
            portRangeMax: 53
            portRangeMin: 53
            protocol: tcp
            remoteIPPrefix: 0.0.0.0/0
          # ---------------------------------------------------------------
          # Cilium data-plane between nodes.
          #
          # CAPO's managed security groups only open the baseline kube API /
          # etcd / kubelet / node-port rules — they DO NOT open the CNI's
          # overlay traffic (see CAPO docs "CNI security group rules"). Without
          # the rules below, cross-node pod traffic (encapsulated in VXLAN UDP
          # 8472) is silently dropped by the Neutron security group: same-node
          # pods work, but pod-to-pod and pod-to-Service across nodes (incl.
          # CoreDNS -> apiserver/pods, which is why DNS "isn't ready") time out.
          #
          # remoteManagedGroups references the managed controlplane+worker SGs
          # by role, so this stays correct regardless of the subnet CIDR.
          # If you switch Cilium to Geneve, change 8472 -> 6081. If you enable
          # Cilium WireGuard/IPsec encryption, also open UDP 51871 / ESP.
          - description: Cilium VXLAN overlay (node-to-node)
            direction: ingress
            etherType: IPv4
            name: Cilium VXLAN
            portRangeMax: 8472
            portRangeMin: 8472
            protocol: udp
            remoteManagedGroups:
              - controlplane
              - worker
          - description: Cilium health checks (node-to-node)
            direction: ingress
            etherType: IPv4
            name: Cilium health (TCP 4240)
            portRangeMax: 4240
            portRangeMin: 4240
            protocol: tcp
            remoteManagedGroups:
              - controlplane
              - worker
          - description: Hubble relay/peer (node-to-node)
            direction: ingress
            etherType: IPv4
            name: Cilium Hubble (TCP 4244)
            portRangeMax: 4244
            portRangeMin: 4244
            protocol: tcp
            remoteManagedGroups:
              - controlplane
              - worker
          - description: ICMP between nodes (health/path MTU)
            direction: ingress
            etherType: IPv4
            name: ICMP (node-to-node)
            protocol: icmp
            remoteManagedGroups:
              - controlplane
              - worker
