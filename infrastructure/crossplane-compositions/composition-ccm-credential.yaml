# Composition for CCMCredential.
#
# Creates a per-project ApplicationCredential for CCM + Cinder CSI.
# The app-cred is created using a per-project ProviderConfig that
# authenticates as yaook-sys-maint to the target project.
#
# Pipeline:
#   1. RoleAssignments (via default ProviderConfig) — pre-existing or created
#   2. ApplicationCredentialV3 (via per-project ProviderConfig) — created
#
# The app-cred connection secret (writeConnectionSecretToRef) contains
# attribute.secret. The app-cred name is deterministic:
# cloud-controller-<projectName>.
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: ccm-credential
  labels:
    provider: openstack
spec:
  compositeTypeRef:
    apiVersion: identity.rpcu.io/v1alpha1
    kind: CCMCredential
  mode: Pipeline
  pipeline:
    - step: patch-and-transform
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          # RoleAssignment: yaook-sys-maint → load-balancer_member in target project
          - name: role-lb
            base:
              apiVersion: identity.openstack.m.crossplane.io/v1alpha1
              kind: RoleAssignmentV3
              spec:
                forProvider:
                  roleIdRef:
                    name: cloud-controller-lb
                  userId: "44b2b48fb89d4fde9d659bf01831d3b0"
                providerConfigRef:
                  name: default
                  kind: ClusterProviderConfig
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.projectId
                toFieldPath: spec.forProvider.projectId
          # RoleAssignment: yaook-sys-maint → member in target project
          - name: role-member
            base:
              apiVersion: identity.openstack.m.crossplane.io/v1alpha1
              kind: RoleAssignmentV3
              spec:
                forProvider:
                  roleIdRef:
                    name: cloud-controller-member
                  userId: "44b2b48fb89d4fde9d659bf01831d3b0"
                providerConfigRef:
                  name: default
                  kind: ClusterProviderConfig
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.projectId
                toFieldPath: spec.forProvider.projectId
          # RoleAssignment: yaook-sys-maint → reader in target project
          - name: role-reader
            base:
              apiVersion: identity.openstack.m.crossplane.io/v1alpha1
              kind: RoleAssignmentV3
              spec:
                forProvider:
                  roleIdRef:
                    name: cloud-controller-reader
                  userId: "44b2b48fb89d4fde9d659bf01831d3b0"
                providerConfigRef:
                  name: default
                  kind: ClusterProviderConfig
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.projectId
                toFieldPath: spec.forProvider.projectId
          # ApplicationCredentialV3 in the target project
          - name: app-cred
            base:
              apiVersion: identity.openstack.m.crossplane.io/v1alpha1
              kind: ApplicationCredentialV3
              spec:
                forProvider:
                  description: "Application credential for CCM + Cinder CSI (managed by Crossplane)"
                  roles:
                    - load-balancer_member
                    - member
                    - reader
                  unrestricted: false
                providerConfigRef:
                  kind: ClusterProviderConfig
                writeConnectionSecretToRef:
                  namespace: crossplane-system
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.projectName
                toFieldPath: spec.forProvider.name
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "cloud-controller-%s"
              - type: FromCompositeFieldPath
                fromFieldPath: spec.projectName
                toFieldPath: metadata.name
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "cloud-controller-app-cred-%s"
              - type: FromCompositeFieldPath
                fromFieldPath: spec.projectName
                toFieldPath: spec.writeConnectionSecretToRef.name
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "cloud-controller-app-cred-%s"
              - type: FromCompositeFieldPath
                fromFieldPath: spec.projectName
                toFieldPath: spec.providerConfigRef.name
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "provider-openstack-%s"
