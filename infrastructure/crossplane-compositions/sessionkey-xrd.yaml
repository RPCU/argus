apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xsessionkeys.rpcu.io
spec:
  group: rpcu.io
  names:
    kind: XSessionKey
    plural: xsessionkeys
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                length:
                  type: integer
                  description: Length of the generated session key
                  default: 32
            status:
              type: object
              properties:
                sessionKey:
                  type: string
                  description: The generated session key
