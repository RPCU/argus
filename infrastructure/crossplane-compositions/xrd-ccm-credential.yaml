# CompositeResourceDefinition for CCMCredential.
#
# A CCMCredential creates a scoped ApplicationCredential for CCM + Cinder CSI
# in a specific OpenStack project. The Composition creates:
#   - ApplicationCredentialV3 (via per-project ProviderConfig)
#   - RoleAssignmentV3 × 3 for yaook-sys-maint (via default ProviderConfig)
#
# Usage:
#   apiVersion: identity.rpcu.io/v1alpha1
#   kind: CCMCredential
#   metadata:
#     name: lab
#     namespace: crossplane-system
#   spec:
#     projectName: lab
#     projectId: e538e6c8466945b4bd07da85a7ee004e
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: ccmcredentials.identity.rpcu.io
spec:
  group: identity.rpcu.io
  names:
    kind: CCMCredential
    plural: ccmcredentials
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                projectName:
                  type: string
                  description: "OpenStack project name (e.g. lab, production)"
                projectId:
                  type: string
                  description: "OpenStack project ID"
              required:
                - projectName
                - projectId
