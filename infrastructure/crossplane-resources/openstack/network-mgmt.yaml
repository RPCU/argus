apiVersion: networking.openstack.m.crossplane.io/v1alpha1
kind: NetworkV2
metadata:
  name: mgmt
spec:
  forProvider:
    adminStateUp: true
    name: mgmt
---
apiVersion: networking.openstack.m.crossplane.io/v1alpha1
kind: SubnetV2
metadata:
  name: mgmt
spec:
  forProvider:
    cidr: 192.168.0.0/24
    networkIdRef:
      name: mgmt
---
apiVersion: networking.openstack.m.crossplane.io/v1alpha1
kind: RouterInterfaceV2
metadata:
  name: mgmtext
spec:
  forProvider:
    routerIdRef:
      name: ext
    subnetIdRef:
      name: mgmt
