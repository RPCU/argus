apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crossplane
spec:
  interval: 5m
  chart:
    spec:
      chart: crossplane
      version: "2.2.0"
      sourceRef:
        kind: HelmRepository
        name: crossplane
        namespace: crossplane-system
  valuesFrom:
    - kind: ConfigMap
      name: crossplane-values
