apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: csi-driver-nfs
  namespace: kube-system
spec:
  interval: 5m
  releaseName: csi-driver-nfs
  chart:
    spec:
      chart: csi-driver-nfs
      version: "4.13.4"
      sourceRef:
        kind: HelmRepository
        name: csi-driver-nfs
        namespace: kube-system
  values:
    # kube-system so the node DaemonSet may use the system-node-critical
    # priority class (same rationale as openstack-cinder-csi).
    driver:
      name: nfs.csi.k8s.io
    controller:
      replicas: 1
