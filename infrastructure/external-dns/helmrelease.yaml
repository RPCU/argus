# InternalDNS with the inovex OpenStack Designate webhook provider, syncing
# Service/Gateway HTTPRoute DNS records into the OpenStack Designate zone
# (rpcu.lan).
#
# The in-tree Designate provider was removed from external-dns (PR #5126).
# The inovex webhook (github.com/inovex/external-dns-openstack-webhook) is the
# official replacement. It runs as a sidecar container in the internal-dns pod
# and authenticates with OpenStack via a clouds.yaml file.
#
# The clouds.yaml is synced from capo-variables (capo-system) by ESO into the
# internal-dns namespace. IMPORTANT: the auth_url in capo-variables must point
# at the gateway endpoint (https://keystone.rpcu.vpn) — the in-cluster Keystone
# (keystone.yaook.svc) is unreachable from the mgmt cluster. The webhook does
# NOT support OS_* env vars for auth (only OS_CLOUD), so the clouds.yaml must
# contain the correct auth_url.
#
# Values come from valuesFrom (the generated `internal-dns-values` ConfigMap,
# see kustomization.yaml + values.yaml) instead of an inline `values:` block, so
# workload clusters can append a SECOND override ConfigMap for per-cluster
# subdomain scoping / registry / credentials (the Sveltos external-dns
# ClusterProfile patches an extra valuesFrom entry — later entries win).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: internal-dns
  namespace: internal-dns
spec:
  interval: 5m
  chart:
    spec:
      chart: external-dns
      version: 1.21.1
      interval: 5m
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: internal-dns
  valuesFrom:
    - kind: ConfigMap
      name: internal-dns-values
