apiVersion: v1
kind: Namespace
metadata:
  name: internal-dns
---
# Manually created so the ESO SecretStore (infrastructure/external-dns) can
# reference it before the Helm chart is applied. The Helm chart's
# serviceAccount.create is set to false to avoid conflicts.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: internal-dns
  namespace: internal-dns
---
# RBAC for the ESO SecretStore — reads the capo-variables secret from
# capo-system (same cross-namespace Kubernetes provider pattern as
# infrastructure/capo-identity and infrastructure/openstack-ccm-identity).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: capo-variables-reader
  namespace: capo-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["capo-variables"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: internal-dns-capo-variables-reader
  namespace: capo-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: capo-variables-reader
subjects:
  - kind: ServiceAccount
    name: internal-dns
    namespace: internal-dns
---
# ESO SecretStore — reads capo-variables from capo-system via the Kubernetes
# provider (cross-namespace, same cluster).
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: capo-system-secrets
  namespace: internal-dns
spec:
  provider:
    kubernetes:
      remoteNamespace: capo-system
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: internal-dns
---
# Copies the raw OpenStack clouds.yaml from capo-variables (capo-system) into
# the internal-dns namespace. The inovex Designate webhook reads this file
# (mounted at /etc/openstack/clouds.yaml) for OpenStack authentication.
#
# IMPORTANT: the auth_url in capo-variables must point at the gateway endpoint
# (https://keystone.rpcu.vpn) — the in-cluster Keystone (keystone.yaook.svc)
# is unreachable from the mgmt cluster. The webhook does NOT support OS_*
# env vars for auth (only OS_CLOUD), so the clouds.yaml must contain the
# correct auth_url when capo-variables is created.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openstack-credentials
  namespace: internal-dns
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: capo-system-secrets
    kind: SecretStore
  target:
    name: openstack-credentials
    creationPolicy: Owner
  data:
    - secretKey: clouds.yaml
      remoteRef:
        key: capo-variables
        property: clouds.yaml
