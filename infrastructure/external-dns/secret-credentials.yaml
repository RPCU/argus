apiVersion: v1
kind: Namespace
metadata:
  name: external-dns
---
# Manually created so the ESO SecretStore (infrastructure/external-dns) can
# reference it before the Helm chart is applied. The Helm chart's
# serviceAccount.create is set to false to avoid conflicts.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-dns
  namespace: external-dns
---
# RBAC for the ESO SecretStore — reads the capo-variables secret from
# capo-system (same cross-namespace Kubernetes provider pattern as
# infrastructure/capo-identity and infrastructure/openstack-ccm-identity).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: capo-variables-reader
  namespace: capo-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["capo-variables"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: external-dns-capo-variables-reader
  namespace: capo-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: capo-variables-reader
subjects:
  - kind: ServiceAccount
    name: external-dns
    namespace: external-dns
---
# ESO SecretStore — reads capo-variables from capo-system via the Kubernetes
# provider (cross-namespace, same cluster).
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: capo-system-secrets
  namespace: external-dns
spec:
  provider:
    kubernetes:
      remoteNamespace: capo-system
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: external-dns
---
# Copies the raw OpenStack clouds.yaml from capo-variables (capo-system) into
# the external-dns namespace. The Designate provider reads this file when
# OS_CLOUD=openstack is set.
#
# The existing clouds.yaml uses auth_url https://keystone.yaook.svc:5000/v3
# (in-cluster Keystone, unreachable from mgmt). The OS_AUTH_URL environment
# variable set in the HelmRelease overrides this at runtime — openstacksdk
# env vars take precedence over clouds.yaml values.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openstack-credentials
  namespace: external-dns
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: capo-system-secrets
    kind: SecretStore
  target:
    name: openstack-credentials
    creationPolicy: Owner
  data:
    - secretKey: clouds.yaml
      remoteRef:
        key: capo-variables
        property: clouds.yaml
