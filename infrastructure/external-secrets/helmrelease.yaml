apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
spec:
  interval: 5m
  chart:
    spec:
      chart: external-secrets
      version: "2.3.0"
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: external-secrets
  valuesFrom:
    - kind: ConfigMap
      name: external-secrets-values
