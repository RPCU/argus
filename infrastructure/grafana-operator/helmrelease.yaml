# Grafana Operator — enables Dashboard as a Service (DaaS) across namespaces.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-operator
  namespace: monitoring
spec:
  interval: 10m
  chart:
    spec:
      chart: grafana-operator
      version: "v5.*"
      interval: 24h
      sourceRef:
        kind: HelmRepository
        name: grafana-operator
        namespace: monitoring
  values:
    # Watch all namespaces to enable cross-namespace DaaS for workload/tenant teams
    watchNamespaces: ""
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 512Mi
