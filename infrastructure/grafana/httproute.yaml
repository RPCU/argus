# HTTPRoute exposing Grafana on the mgmt internal Gateway.
# Accessible at https://grafana.mgmt.rpcu.lan.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: https
      namespace: kgateway-system
      sectionName: https
  hostnames:
    - grafana.mgmt.rpcu.lan
  rules:
    - backendRefs:
        - name: grafana-service
          port: 3000
