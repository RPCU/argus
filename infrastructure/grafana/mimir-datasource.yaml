# GrafanaDatasource — pre-provisioned Mimir TSDB datasource for Grafana Operator.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: mimir
  namespace: monitoring
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: "grafana-central"
  datasource:
    name: Mimir
    uid: Mimir
    type: prometheus
    access: proxy
    url: http://mimir-gateway.monitoring.svc:80/prometheus
    isDefault: true
    editable: false
