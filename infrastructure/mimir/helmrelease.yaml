# Grafana Mimir — centralised TSDB receiving remote_write from all clusters.
#
# Deployed in MONOLITHIC mode (single binary, 1 replica) with filesystem
# storage. This is sufficient for 2-3 clusters and can be upgraded to Swift or
# S3-compatible storage later.
#
# The nginx gateway is enabled to provide a single entrypoint for both
# remote_write (POST /api/v1/push) and Prometheus-compatible queries
# (GET /prometheus/...). Grafana connects to mimir-gateway:80/prometheus.
#
# Workload clusters remote_write to https://mimir.mgmt.rpcu.lan/api/v1/push
# (via the mgmt Gateway; see httproute.yaml). The mgmt cluster writes locally
# to http://mimir-gateway.monitoring.svc:80/api/v1/push.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mimir
  namespace: monitoring
spec:
  interval: 10m
  chart:
    spec:
      chart: mimir-distributed
      version: 5.6.0
      interval: 24h
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: monitoring
  values:
    # --- Global Cluster Domain for mgmt cluster ---
    global:
      clusterDomain: "mgmt.local."

    # --- Top-level Nginx config ---
    nginx:
      config:
        resolver: "10.96.0.10 valid=10s"

    # --- Minimal lightweight deployment (1 replica per component) ---
    ingester:
      replicas: 1
      zoneAwareReplication:
        enabled: false
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi

    store_gateway:
      replicas: 1
      zoneAwareReplication:
        enabled: false
      readinessProbe:
        initialDelaySeconds: 60
      resources:
        requests:
          cpu: 30m
          memory: 64Mi
        limits:
          memory: 256Mi

    distributor:
      replicas: 1
      resources:
        requests:
          cpu: 30m
          memory: 64Mi
        limits:
          memory: 256Mi

    querier:
      replicas: 1
      resources:
        requests:
          cpu: 30m
          memory: 64Mi
        limits:
          memory: 256Mi

    query_frontend:
      replicas: 1
      resources:
        requests:
          cpu: 20m
          memory: 32Mi
        limits:
          memory: 128Mi

    compactor:
      replicas: 1
      readinessProbe:
        initialDelaySeconds: 60
      resources:
        requests:
          cpu: 30m
          memory: 64Mi
        limits:
          memory: 256Mi

    # --- Filesystem storage & clean memberlist ring for single replica ---
    mimir:
      structuredConfig:
        memberlist:
          join_members:
            - mimir-gossip-ring.monitoring.svc.mgmt.local.
        ingester:
          ring:
            unregister_on_shutdown: true
            replication_factor: 1
        common:
          storage:
            backend: filesystem
        compactor:
          data_dir: /data/compactor-data
        blocks_storage:
          backend: filesystem
          filesystem:
            dir: /data/blocks

    # --- Disable heavy/optional subcharts ---
    query_scheduler:
      enabled: false
    ruler:
      enabled: false
    alertmanager:
      enabled: false
    overrides_exporter:
      enabled: false

    # --- Disable built-in MinIO ---
    minio:
      enabled: false

    # --- Disable rollout operator ---
    rollout_operator:
      enabled: false

    # --- nginx gateway for routing ---
    gateway:
      enabledNonEnterprise: true
      replicas: 1
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          memory: 64Mi
      nginx:
        config:
          resolver: "10.96.0.10 valid=10s"
