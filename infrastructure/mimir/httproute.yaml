# HTTPRoute exposing Mimir on the mgmt internal Gateway for cross-cluster
# remote_write. Workload clusters send metrics to
# https://mimir.mgmt.rpcu.lan/api/v1/push — this route forwards to the
# mimir-gateway service in the monitoring namespace.
#
# The mgmt Gateway (*.mgmt.rpcu.lan, kgateway-system) allows routes from all
# namespaces, so this HTTPRoute in the monitoring namespace can attach to it.
# The backend is in the same namespace — no ReferenceGrant needed.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mimir
  namespace: monitoring
spec:
  parentRefs:
    - name: https
      namespace: kgateway-system
      sectionName: https
  hostnames:
    - mimir.mgmt.rpcu.lan
  rules:
    - backendRefs:
        - name: mimir-gateway
          port: 80
