# -----------------------------------------------------------------------------
# Renders the OpenStack Cloud Controller Manager cloud-config secret
# (kube-system/cloud-config) from the manually-placed capo-variables clouds.yaml
# (capo-system).
#
# The produced secret carries two keys, both projected by the chart into
# /etc/config (the CCM reads /etc/config/cloud.conf):
#   - clouds.yaml : copied verbatim from capo-variables — the OpenStack auth
#                   credentials (auth_url, username, password, project, domains).
#   - cloud.conf  : INI config the CCM binary reads. [Global] delegates auth to
#                   the clouds.yaml via use-clouds=true; [LoadBalancer] configures
#                   Octavia (external/floating network for Service VIPs).
#
# Why use-clouds instead of expanding credentials into [Global]: it avoids
# parsing the clouds.yaml blob in an ESO template and keeps a single credential
# source of truth (capo-variables), exactly like CAPO's identityRef.
# -----------------------------------------------------------------------------
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloud-config
  namespace: kube-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: capo-system-secrets
    kind: SecretStore
  target:
    name: cloud-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Verbatim clouds.yaml — referenced by cloud.conf's clouds-file below.
        clouds.yaml: "{{ .cloudsYaml }}"
        # CCM INI config.
        #   [Global] use-clouds=true  -> read auth from clouds-file / cloud
        #   [LoadBalancer]            -> Octavia integration for type=LoadBalancer
        #
        # floating-network-id is the OpenStack external network used to allocate
        # floating IPs for Service VIPs. It matches the Cluster's
        # externalNetworkId variable (clusters/mgmt/clusters/mgmt.yaml). If the
        # external network ever changes, update it here too.
        #
        # lb-provider=ovn: the mgmt cluster's OpenStack uses the OVN backend
        # for Octavia, NOT Amphora. Without this, the OCCM defaults to Amphora
        # and Octavia rejects the request with "Provider 'amphora' is not
        # enabled".
        cloud.conf: |
          [Global]
          use-clouds=true
          clouds-file=/etc/config/clouds.yaml
          cloud=openstack
          tls-insecure=true

          [LoadBalancer]
          enabled=true
          floating-network-id=1cfd69da-057c-4748-a0d4-de5b0ca77db2
          create-monitor=true
          lb-provider=ovn
  data:
    - secretKey: cloudsYaml
      remoteRef:
        key: capo-variables
        property: clouds.yaml
