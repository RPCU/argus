# -----------------------------------------------------------------------------
# ExternalSecret backend for rendering the OpenStack Cloud Controller Manager
# cloud-config (kube-system/cloud-config) from the OpenStack clouds.yaml.
#
# Single source of truth: the `capo-variables` secret is placed MANUALLY in the
# capo-system namespace (see infrastructure/cluster-api-providers/README.md) and
# already carries the cluster's OpenStack credentials as clouds.yaml. This
# SecretStore lets External Secrets read it from capo-system (same cluster,
# cross-namespace via the Kubernetes provider); the ExternalSecret in
# externalsecret.yaml projects it into kube-system as the OCCM `cloud-config`
# secret (cloud.conf + clouds.yaml).
#
# This mirrors infrastructure/capo-identity (which feeds CAPO's identityRef) but
# targets kube-system for the CCM. It lives in its own Flux Kustomization so a
# credential-plumbing failure cannot abort the CCM HelmRelease apply.
#
# Auth: the `openstack-ccm-reader` ServiceAccount (kube-system) authenticates to
# the local API; RBAC granting it read access to the capo-variables secret lives
# in capo-system (Role + RoleBinding below).
# -----------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openstack-ccm-reader
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openstack-ccm-capo-variables-reader
  namespace: capo-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["capo-variables"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openstack-ccm-capo-variables-reader
  namespace: capo-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openstack-ccm-capo-variables-reader
subjects:
  - kind: ServiceAccount
    name: openstack-ccm-reader
    namespace: kube-system
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: capo-system-secrets
  namespace: kube-system
spec:
  provider:
    kubernetes:
      remoteNamespace: capo-system
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: openstack-ccm-reader
