apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openstack-cinder-csi
  namespace: kube-system
spec:
  interval: 5m
  releaseName: openstack-cinder-csi
  chart:
    spec:
      chart: openstack-cinder-csi
      version: "2.36.0"
      sourceRef:
        kind: HelmRepository
        name: cloud-provider-openstack-cinder
        namespace: kube-system
  valuesFrom:
    - kind: ConfigMap
      name: openstack-cinder-csi-values
