# CephFS (Ceph File System) — provides ReadWriteMany (RWX) volumes.
#
# The existing rdb-pool / `general` StorageClass is RBD (a raw block device),
# which is ReadWriteOnce only — a block volume can be mounted read-write by a
# single node at a time. A shared POSIX filesystem mountable by many nodes/pods
# simultaneously (RWX) requires CephFS, which is what this CephFilesystem
# provides. It creates the metadata + data pools and the MDS (metadata server)
# daemons the filesystem needs.
#
# Consumed:
#   - directly on the openstack cluster via the `cephfs` StorageClass
#     (storageclasscephfs.yaml).
#   - remotely (EXTERNAL cluster) by the mgmt cluster and opt-in workload
#     clusters via the standalone ceph-csi-cephfs driver
#     (infrastructure/ceph-csi-cephfs), which authenticates with the CephFS
#     CephClient key (openstack-clients.yaml `cephfs` client).
apiVersion: ceph.rook.io/v1
kind: CephFilesystem
metadata:
  name: rpcu-fs
  namespace: rook-ceph
spec:
  # Filesystem metadata pool — small, must be replicated (never erasure-coded).
  metadataPool:
    failureDomain: host
    replicated:
      size: 2
    deviceClass: nvme
  # Filesystem data pool(s). Mirrors the rdb-pool sizing (replica-2 on nvme,
  # host failure domain) for consistency on the 3-node cluster.
  dataPools:
    - name: data0
      failureDomain: host
      replicated:
        size: 2
      deviceClass: nvme
      parameters:
        pg_autoscale_mode: "on"
        # This is the CLUSTER'S LARGEST pool by far (~1 TiB stored, ~70% of
        # raw capacity — the CephFS/NFS media data). It was left at pg_num 32
        # by the July 2026 CRUSH-root fix, which was far too coarse: at ~31 GiB
        # per PG on a 3-OSD replica-2 cluster the PGs split 26/19/19, so quinn
        # (osd.2) carried ~40% of the bytes while lucy/makise held ~30% each —
        # osd.2 hit full_ratio (95%) and blocked writes cluster-wide even though
        # the cluster was only ~73% full (2026-07-10 incident). The upmap
        # balancer could not fix it because it balances on aggregate PG COUNT
        # (which was even), not per-pool bytes — coarse, oversized PGs give it
        # nothing to smooth. Fixed live by splitting pg_num 32 -> 128 (finer PGs
        # the balancer can distribute evenly) + tightening
        # mgr/balancer/upmap_max_deviation to 1. The target_size_ratio below
        # tells the autoscaler this pool holds the bulk of the data so it
        # provisions/keeps enough PGs up front instead of collapsing back to 32.
        # rdb-pool also declares 0.8; the autoscaler normalizes the ratios
        # across pools, so both dominant pools claiming 0.8 is fine.
        target_size_ratio: "0.8"
  # Do not delete the pools if the CephFilesystem CR is removed — protects data.
  preserveFilesystemOnDelete: true
  # MDS daemons. activeCount: 1 with a standby-replay hot standby for failover.
  metadataServer:
    activeCount: 1
    activeStandby: true
    # cluster-critical priority + guaranteed resources (previously BestEffort).
    # Rook auto-sets mds_cache_memory_limit to ~50% of the memory limit.
    priorityClassName: system-cluster-critical
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        memory: 4Gi
    # REQUIRED anti-affinity: without it both MDS pods (active + standby-replay)
    # were observed co-scheduled on the same node (quinn) — a single node
    # failure would have taken CephFS down entirely, defeating the standby.
    placement:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: rook-ceph-mds
                rook_file_system: rpcu-fs
            topologyKey: kubernetes.io/hostname
