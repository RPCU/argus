# NFS-Ganesha gateway exporting the rpcu-fs CephFilesystem to EXTERNAL
# clusters (mgmt + opt-in workload clusters), which consume it via the
# csi-driver-nfs provisioner (infrastructure/csi-driver-nfs) for
# ReadWriteMany (RWX) volumes.
#
# WHY NFS and not the ceph-csi-cephfs driver: this Rook cluster runs on POD
# networking, so every Ceph daemon advertises pod/ClusterIP addresses
# (10.244.x / 10.96.x) in the cluster maps. An external ceph-csi client must
# connect DIRECTLY to the active mgr (subvolume provisioning) and to the
# MDS/OSDs (mount + IO) at those advertised addresses — unreachable from the
# OpenStack VMs the other clusters run on. Fronting the mons with
# LoadBalancers is not sufficient (CreateVolume hangs until the CSI deadline;
# PVCs stay Pending forever). The NFS gateway runs IN-cluster (full Ceph
# connectivity) and external clients only need plain NFS/2049 to its
# LoadBalancer IP — no Ceph map connectivity at all.
#
# The export itself is NOT declarable on this CR (the CephNFS CRD has no
# export spec — exports are mgr `nfs` module state in the .nfs RADOS pool).
# It is enforced declaratively by the `rpcu-nfs-export-ensure` CronJob
# (nfs-export-ensure.yaml), which creates the export if missing and re-applies
# security_label=false if it ever drifts (e.g. after the CephNFS cluster or
# export is recreated).
#
apiVersion: ceph.rook.io/v1
kind: CephNFS
metadata:
  name: rpcu-nfs
  namespace: rook-ceph
spec:
  # IMPORTANT: the export MUST have security_label=false. Without it, Linux
  # 6.x+ kernels fail with EREMOTEIO (Remote I/O error) on statx()/opendir()
  # for NON-ROOT users (root is unaffected), because the NFSv4.2 GETATTR
  # bitmap requests a security_label attribute Ganesha/CephFS can't serve.
  # This breaks Radarr/Jellyfin and any .NET app using Directory.Exists()
  # on NFS-backed mounts (July 2026 production incident). The
  # nfs-export-ensure CronJob keeps this setting applied.
  #
  # REMOUNT TRAP (July 2026, second incident): the running ganesha only picks
  # up an export config change on restart/reload, AND every NFS client caches
  # the server's supported-attributes bitmap in its mount superblock at mount
  # time. A client that mounted while ganesha still advertised security_label
  # keeps requesting it FOREVER (until remount) and gets EREMOTEIO for every
  # non-root statx() once the server stops serving it. After changing
  # security_label: restart the ganesha pod AND force a remount on every
  # consuming cluster (scale ALL pods sharing the affected PVCs on a node to
  # zero so kubelet unstages the volume, then scale back up).
  server:
    active: 1
    logLevel: NIV_INFO
    # Ganesha was BestEffort with no priorityClass — the same gap that made
    # mon/mgr/osd/mds the first eviction/OOM victims on these hyperconverged
    # nodes (see cephcluster.yaml). Exit-137 kills of the gateway during the
    # 2026-07-06 node event each cost a 90s NFS grace period + client session
    # churn on every consuming cluster. No CPU limit on purpose (repo
    # convention — throttling hurts tail latency).
    priorityClassName: system-cluster-critical
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        memory: 2Gi
    # Relax the liveness probe (default: period=10s failure=10 ≈ 100s). A
    # kill → restart cycle is EXPENSIVE for NFS (90s grace period, stalled
    # clients, session churn), so tolerate ~6 min of unresponsiveness before
    # killing — a hung ganesha this long is genuinely dead, while a slow
    # startup after a node event is not. Rook keeps its default rpcinfo
    # handler; only the timings are overridden.
    livenessProbe:
      probe:
        initialDelaySeconds: 30
        timeoutSeconds: 10
        periodSeconds: 15
        failureThreshold: 24
---
# LoadBalancer Service pinning the NFS gateway on the Cilium L2 pool
# ("internal", 10.0.0.240-253; 240 kgateway, 241 powerdns, 245 NFS). This IP
# is what the consuming clusters' `ceph-cephfs` StorageClass points at
# (infrastructure/csi-driver-nfs/storageclass.yaml `server:` parameter — keep
# the two in sync). Rook's own ClusterIP service remains for intra-cluster
# use; this one is additive. The IP is pinned via the Cilium LB-IPAM
# annotation (same convention as infrastructure/kgateway/gateway.yaml) —
# spec.loadBalancerIP is deprecated since Kubernetes v1.24.
apiVersion: v1
kind: Service
metadata:
  name: rook-ceph-nfs-rpcu-nfs-external
  namespace: rook-ceph
  labels:
    app: rook-ceph-nfs
    ceph_nfs: rpcu-nfs
  annotations:
    lbipam.cilium.io/ips: "10.0.0.245"
spec:
  type: LoadBalancer
  selector:
    app: rook-ceph-nfs
    ceph_nfs: rpcu-nfs
    instance: a
  ports:
    - name: nfs
      port: 2049
      protocol: TCP
      targetPort: 2049
