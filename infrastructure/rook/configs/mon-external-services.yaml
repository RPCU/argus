# LoadBalancer Services for Ceph mons — exposes the mon endpoints outside the
# openstack cluster for external consumers (mgmt, workload clusters) that run
# the standalone ceph-csi-cephfs driver. Cilium L2 announcements advertise the
# pinned IPs on eno1.4000 (VLAN 4000).
#
# The existing ClusterIP services remain for intra-cluster communication; these
# are additive. The pinned IPs are within the CiliumLoadBalancerIPPool
# "internal" (10.0.0.240-253).
apiVersion: v1
kind: Service
metadata:
  name: rook-ceph-mon-a-external
  namespace: rook-ceph
  labels:
    app: rook-ceph-mon
    ceph_daemon_id: a
    mon: a
    mon_cluster: rook-ceph
    rook_cluster: rook-ceph
spec:
  type: LoadBalancer
  loadBalancerIP: 10.0.0.242
  selector:
    app: rook-ceph-mon
    ceph_daemon_id: a
    mon: a
    mon_cluster: rook-ceph
    rook_cluster: rook-ceph
  ports:
    - name: msgr
      port: 6789
      protocol: TCP
      targetPort: 6789
    - name: msgr2
      port: 3300
      protocol: TCP
      targetPort: 3300
---
