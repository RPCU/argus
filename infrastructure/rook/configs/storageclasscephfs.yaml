# CephFS StorageClass — ReadWriteMany (RWX) capable.
#
# Uses the cephfs.csi.ceph.com provisioner (the Rook-managed CephFS CSI driver
# on the openstack cluster) against the rpcu-fs filesystem's data0 pool. PVCs
# created with this class can be mounted ReadWriteMany by multiple pods across
# multiple nodes at once.
#
# NOT marked default — the RBD `general` class stays the cluster default; only
# workloads that explicitly need RWX request `cephfs`.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: cephfs
provisioner: rook-ceph.cephfs.csi.ceph.com
parameters:
  clusterID: rook-ceph
  # The CephFilesystem name and its data pool (see cephfilesystem.yaml).
  fsName: rpcu-fs
  pool: rpcu-fs-data0
  # The secrets contain Ceph admin credentials for the CephFS provisioner/node.
  csi.storage.k8s.io/provisioner-secret-name: rook-csi-cephfs-provisioner
  csi.storage.k8s.io/provisioner-secret-namespace: rook-ceph
  csi.storage.k8s.io/controller-expand-secret-name: rook-csi-cephfs-provisioner
  csi.storage.k8s.io/controller-expand-secret-namespace: rook-ceph
  csi.storage.k8s.io/node-stage-secret-name: rook-csi-cephfs-node
  csi.storage.k8s.io/node-stage-secret-namespace: rook-ceph
reclaimPolicy: Delete
allowVolumeExpansion: true
