# CAPI/CAPO management cluster bootstrap for OPT-IN workload clusters.
#
# Deploys the full Cluster API + CAPO stack onto a workload cluster so it can
# become a new management cluster capable of provisioning further clusters via
# CAPI. Components are delivered as Flux Kustomization CRs (GitOps-managed,
# drift-corrected) — Sveltos pushes the CRs; Flux on the target cluster
# reconciles them from the central repo.
#
# What is deployed (in dependency order):
#   1. cert-manager           — TLS certificate management (CAPI operator prereq)
#   2. external-secrets       — credential syncing (CAPO identity prereq)
#   3. cluster-api-operator   — declarative CAPI provider lifecycle manager
#   4. ORC                    — OpenStack Resource Controller (CAPO image resolution)
#   5. cluster-api-providers  — CAPI core + kubeadm + CAPO provider CRs
#   6. capo-identity          — ESO: capo-variables → mgmt-cloud-config (identityRef)
#   7. cluster-api-templates  — ClusterClass + versioned OpenStack templates
#
# Credential transfer:
#   The capo-variables secret (OpenStack admin clouds.yaml in capo-system) is
#   read from the current management cluster via templateResourceRefs and pushed
#   to the target cluster. This is the same credential source CAPO, the CCM,
#   and the Cinder CSI all share. On the new management cluster, it must exist
#   in capo-system before CAPO can provision infrastructure.
#
# Prerequisites on the target cluster:
#   - Cilium (CNI) — pods must schedule
#   - Flux (GitOps) — reconciles the Kustomization CRs pushed by this profile
#   Both are delivered by the cilium and flux/flux-instance ClusterProfiles.
#
# Gated by the opt-in label sveltos.argus.rpcu.io/capi-management: enabled.
#
# dependsOn the `flux-instance` ClusterProfile: this profile pushes Flux
# Kustomization CRs that reference the `flux-system` GitRepository and are
# reconciled by the kustomize/helm controllers — all of which only exist once
# the Flux Operator + FluxInstance have deployed the Flux controllers, CRDs,
# and the GitRepository source.
apiVersion: config.projectsveltos.io/v1beta1
kind: ClusterProfile
metadata:
  name: capi-management
  namespace: projectsveltos
spec:
  syncMode: ContinuousWithDriftDetection
  dependsOn:
    - flux-instance
  clusterSelector:
    matchLabels:
      type: workload
      sveltos.argus.rpcu.io/capi-management: enabled
  # Read the capo-variables secret from the CURRENT management cluster so it
  # can be pushed to the target cluster. The addon-controller SA needs read
  # access to secrets in capo-system (granted by rbac.yaml).
  templateResourceRefs:
    - resource:
        apiVersion: v1
        kind: Secret
        namespace: capo-system
        name: capo-variables
      identifier: CapoVariables
  policyRefs:
    # Transfer the capo-variables secret to the target cluster
    - name: capi-management-capo-variables
      namespace: projectsveltos
      kind: ConfigMap
    # Flux Kustomization CRs for the CAPI/CAPO stack
    - name: capi-management-flux-kustomizations
      namespace: projectsveltos
      kind: ConfigMap
---
# Transfer the capo-variables secret from the current mgmt cluster to the
# target cluster. Sveltos instantiates the {{ .CapoVariables }} template from
# the templateResourceRefs above and deploys the resulting Secret to capo-system
# on the target cluster.
#
# This contains the OpenStack admin clouds.yaml that CAPO reads via its
# configSecret (infrastructure-openstack.yaml spec.configSecret). Without it,
# the cluster-api-providers Kustomization will apply but CAPO will not be able
# to authenticate to OpenStack.
apiVersion: v1
kind: ConfigMap
metadata:
  name: capi-management-capo-variables
  namespace: projectsveltos
  annotations:
    projectsveltos.io/template: "true"
data:
  capo-variables-secret.yaml: |
    apiVersion: v1
    kind: Namespace
    metadata:
      name: capo-system
    ---
    apiVersion: v1
    kind: Secret
    metadata:
      name: capo-variables
      namespace: capo-system
    type: Opaque
    data:
      clouds.yaml: {{ index (getResource "CapoVariables").data "clouds.yaml" }}
---
# Flux Kustomization CRs for the CAPI/CAPO management stack, pushed to the
# target cluster. Each Kustomization points at a path in the central Git repo
# and is reconciled by Flux's kustomize/helm controllers.
#
# Ordering is enforced via Flux dependsOn between the Kustomizations:
#   cert-manager → cluster-api-operator → cluster-api-providers
#   external-secrets → cluster-api-providers, capo-identity
#   cluster-api-providers → capo-identity, cluster-api-templates
#   (ORC and cluster-api-templates have no inter-dependencies beyond providers)
apiVersion: v1
kind: ConfigMap
metadata:
  name: capi-management-flux-kustomizations
  namespace: projectsveltos
data:
  # --- cert-manager (v1.19.2) ---
  cert-manager.yaml: |
    apiVersion: kustomize.toolkit.fluxcd.io/v1
    kind: Kustomization
    metadata:
      name: cert-manager
      namespace: flux-system
    spec:
      interval: 10m
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      path: ./infrastructure/cert-manager
      prune: true
      wait: true
      timeout: 5m
  # --- external-secrets (v2.3.0) ---
  external-secrets.yaml: |
    apiVersion: kustomize.toolkit.fluxcd.io/v1
    kind: Kustomization
    metadata:
      name: external-secrets
      namespace: flux-system
    spec:
      interval: 10m
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      path: ./infrastructure/external-secrets
      prune: true
      wait: true
      timeout: 5m
  # --- cluster-api-operator (v0.27.0) — depends on cert-manager ---
  cluster-api-operator.yaml: |
    apiVersion: kustomize.toolkit.fluxcd.io/v1
    kind: Kustomization
    metadata:
      name: cluster-api-operator
      namespace: flux-system
    spec:
      interval: 10m
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      path: ./infrastructure/cluster-api-operator
      prune: true
      wait: true
      timeout: 5m
      dependsOn:
        - name: cert-manager
  # --- ORC (v2.5.0) — OpenStack Resource Controller, CAPO image resolution ---
  orc.yaml: |
    apiVersion: kustomize.toolkit.fluxcd.io/v1
    kind: Kustomization
    metadata:
      name: orc
      namespace: flux-system
    spec:
      interval: 10m
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      path: ./infrastructure/orc
      prune: true
      wait: true
      timeout: 5m
  # --- cluster-api-providers — CAPI core + kubeadm + CAPO CRs ---
  # depends on: cluster-api-operator (CRDs), external-secrets (credential
  # plumbing), orc (image resolution dependency for CAPO v0.14.x)
  cluster-api-providers.yaml: |
    apiVersion: kustomize.toolkit.fluxcd.io/v1
    kind: Kustomization
    metadata:
      name: cluster-api-providers
      namespace: flux-system
    spec:
      interval: 10m
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      path: ./infrastructure/cluster-api-providers
      prune: true
      wait: true
      timeout: 10m
      dependsOn:
        - name: cluster-api-operator
        - name: external-secrets
        - name: orc
  # --- capo-identity — ESO: capo-variables (capo-system) → mgmt-cloud-config ---
  # Split from cluster-api-templates so an ESO failure can't abort the
  # ClusterClass apply. wait:false because the ExternalSecret only becomes
  # Ready once capo-variables exists (transferred by this profile's
  # capi-management-capo-variables ConfigMap).
  capo-identity.yaml: |
    apiVersion: kustomize.toolkit.fluxcd.io/v1
    kind: Kustomization
    metadata:
      name: capo-identity
      namespace: flux-system
    spec:
      interval: 10m
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      path: ./infrastructure/capo-identity
      prune: true
      wait: false
      timeout: 5m
      dependsOn:
        - name: external-secrets
        - name: cluster-api-providers
  # --- cluster-api-templates — ClusterClass + versioned OpenStack templates ---
  # wait intentionally omitted: health-gating on the ClusterClass during
  # template rotation can wedge the Kustomization (see clusters/mgmt comment).
  cluster-api-templates.yaml: |
    apiVersion: kustomize.toolkit.fluxcd.io/v1
    kind: Kustomization
    metadata:
      name: cluster-api-templates
      namespace: flux-system
    spec:
      interval: 10m
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      path: ./infrastructure/cluster-api-templates
      prune: true
      timeout: 10m
      dependsOn:
        - name: cluster-api-providers
