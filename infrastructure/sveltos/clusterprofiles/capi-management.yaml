# CAPI/CAPO management cluster bootstrap for OPT-IN workload clusters.
#
# Deploys the full Cluster API + CAPO stack AND Sveltos (with all
# ClusterProfiles) onto a workload cluster so it can become a new management
# cluster capable of provisioning further clusters via CAPI and managing them
# via Sveltos.
#
# What is deployed (in dependency order):
#   1. Sveltos core controllers (Flux Kustomization -> infrastructure/sveltos/core)
#      CRDs installed by the HelmRelease once Flux reconciles the Kustomization
#   2. Sveltos ClusterProfiles + backing ConfigMaps — pushed as raw manifests
#      so the new mgmt cluster can manage its own workload clusters
#   3. cert-manager           — TLS certificate management (CAPI operator prereq)
#   4. external-secrets       — credential syncing (CAPO identity prereq)
#   5. cluster-api-operator   — declarative CAPI provider lifecycle manager
#   6. ORC                    — OpenStack Resource Controller (CAPO image resolution)
#   7. cluster-api-providers  — CAPI core + kubeadm + kamaji + CAPO provider CRs
#   8. capo-identity          — ESO: capo-variables -> mgmt-cloud-config (identityRef)
#   9. cluster-api-templates  — ClusterClass + versioned OpenStack templates
#  10. kamaji                  — Kamaji hosted control-plane manager (Helm + etcd
#                               datastore); the openstack-kamaji ClusterClass runs
#                               each workload apiserver as pods here
#
# Credential transfer:
#   The capo-variables secret (OpenStack admin clouds.yaml in capo-system) is
#   read from the current management cluster via templateResourceRefs and pushed
#   to the target cluster.
#
# Prerequisites on the target cluster:
#   - Cilium (CNI) -- pods must schedule
#   - Flux (GitOps) -- reconciles the Kustomization CRs pushed by this profile
#   Both are delivered by the cilium and flux/flux-instance ClusterProfiles.
#
# Gated by the opt-in label sveltos.argus.rpcu.io/capi-management: enabled.
#
# Per-cluster CAPO version override:
#   Set the annotation sveltos.argus.rpcu.io/capo-version on the CAPI Cluster CR
#   (e.g. "v0.14.4") to override the repo-pinned CAPO InfrastructureProvider
#   version on the target cluster. The capi-management-flux-kustomizations
#   ConfigMap is Sveltos-templated: when the annotation is present, the
#   cluster-api-providers Flux Kustomization gets a patch repointing the CAPO
#   InfrastructureProvider .spec.version; when absent, no patch is emitted and
#   the default from infrastructure/cluster-api-providers applies unchanged.
#
# dependsOn the flux-instance ClusterProfile: this profile pushes Flux
# Kustomization CRs that reference the flux-system GitRepository and are
# reconciled by the kustomize/helm controllers -- all of which only exist once
# the Flux Operator + FluxInstance have deployed the Flux controllers, CRDs,
# and the GitRepository source.
apiVersion: config.projectsveltos.io/v1beta1
kind: ClusterProfile
metadata:
  name: capi-management
  namespace: projectsveltos
spec:
  syncMode: ContinuousWithDriftDetection
  dependsOn:
    - flux-instance
  clusterSelector:
    matchLabels:
      type: workload
      sveltos.argus.rpcu.io/capi-management: enabled
  templateResourceRefs:
    - resource:
        apiVersion: v1
        kind: Secret
        namespace: capo-system
        name: capo-variables
      identifier: CapoVariables
    # The workload CAPI Cluster itself, so templates can read its annotations
    # (e.g. the per-cluster CAPO version override). .Cluster.metadata.* is only
    # reliably exposed for name/namespace/kind; arbitrary annotations are read
    # via getResource on an explicitly-registered resource.
    - resource:
        apiVersion: cluster.x-k8s.io/v1beta2
        kind: Cluster
        namespace: "{{ .Cluster.metadata.namespace }}"
        name: "{{ .Cluster.metadata.name }}"
      identifier: WorkloadCluster
  policyRefs:
    - name: capi-management-capo-variables
      namespace: projectsveltos
      kind: ConfigMap
    - name: capi-management-sveltos-core
      namespace: projectsveltos
      kind: ConfigMap
    - name: capi-management-flux-kustomizations
      namespace: projectsveltos
      kind: ConfigMap
    - name: capi-management-kamaji-values
      namespace: projectsveltos
      kind: ConfigMap
    - name: capi-management-sveltos-profiles
      namespace: projectsveltos
      kind: ConfigMap
    - name: capi-management-capo-rbac
      namespace: projectsveltos
      kind: ConfigMap
---
# RBAC for the capi-management ClusterProfile: grant the addon-controller read
# access to the capo-variables Secret in the capo-system namespace on the
# management cluster. The templateResourceRefs in the capi-management profile
# read this secret and push it to target clusters as part of the CAPI/CAPO
# bootstrap.
#
# Uses a namespace-scoped Role (not the ClusterRole) because the ClusterRole
# has resourceNames restrictions that prevent listing secrets in arbitrary
# namespaces. The Role allows get/list on the capo-system namespace.
apiVersion: v1
kind: ConfigMap
metadata:
  name: capi-management-capo-rbac
  namespace: projectsveltos
data:
  capo-system-role.yaml: |
    apiVersion: rbac.authorization.k8s.io/v1
    kind: Role
    metadata:
      name: addon-controller-capo-variables-reader
      namespace: capo-system
    rules:
      - apiGroups: [""]
        resources: ["secrets"]
        resourceNames: ["capo-variables"]
        verbs: ["get", "list", "watch"]
    ---
    apiVersion: rbac.authorization.k8s.io/v1
    kind: RoleBinding
    metadata:
      name: addon-controller-capo-variables-reader
      namespace: capo-system
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: Role
      name: addon-controller-capo-variables-reader
    subjects:
      - kind: ServiceAccount
        name: addon-controller
        namespace: projectsveltos
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: capi-management-capo-variables
  namespace: projectsveltos
  annotations:
    projectsveltos.io/template: "true"
data:
  capo-variables-secret.yaml: |
    apiVersion: v1
    kind: Namespace
    metadata:
      name: capo-system
    ---
    apiVersion: v1
    kind: Secret
    metadata:
      name: capo-variables
      namespace: capo-system
    type: Opaque
    data:
      clouds.yaml: {{ index (getResource "CapoVariables").data "clouds.yaml" }}
---
# Sveltos core controllers deployed via Flux Kustomization pointing at the
# shared infrastructure/sveltos/core base. The Flux Kustomization CR is applied
# directly by Sveltos; Flux on the target cluster then reconciles the core
# manifests from Git. The sveltos-core-values ConfigMap provides per-cluster
# values (domain, managementCluster) referenced by the HelmReleases in core/.
apiVersion: v1
kind: ConfigMap
metadata:
  name: capi-management-sveltos-core
  namespace: projectsveltos
  annotations:
    projectsveltos.io/template: "true"
data:
  sveltos-core-values.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: sveltos-core-values
      namespace: projectsveltos
    data:
      values.yaml: |
        kubernetesClusterDomain: "{{ .Cluster.metadata.name }}.local"
        agent:
          managementCluster: true
        registerMgmtClusterJob:
          registerMgmtCluster:
            args:
              - --labels=type=mgmt
  sveltos-core-flux-kustomization.yaml: |
    apiVersion: kustomize.toolkit.fluxcd.io/v1
    kind: Kustomization
    metadata:
      name: sveltos-core
      namespace: flux-system
    spec:
      interval: 10m
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      path: ./infrastructure/sveltos/core
      prune: true
      wait: false
      timeout: 5m
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: capi-management-flux-kustomizations
  namespace: projectsveltos
  # Templated so the CAPO provider version can be overridden per workload
  # cluster from the CAPI Cluster annotation
  # sveltos.argus.rpcu.io/capo-version (see cluster-api-providers.yaml below).
  # When the annotation is absent, no patch is emitted and the repo-pinned
  # CAPO version (infrastructure/cluster-api-providers/infrastructure-openstack.yaml)
  # applies unchanged.
  annotations:
    projectsveltos.io/template: "true"
data:
  cert-manager.yaml: |
    apiVersion: kustomize.toolkit.fluxcd.io/v1
    kind: Kustomization
    metadata:
      name: cert-manager
      namespace: flux-system
    spec:
      interval: 10m
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      path: ./infrastructure/cert-manager
      prune: true
      wait: true
      timeout: 5m
  external-secrets.yaml: |
    apiVersion: kustomize.toolkit.fluxcd.io/v1
    kind: Kustomization
    metadata:
      name: external-secrets
      namespace: flux-system
    spec:
      interval: 10m
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      path: ./infrastructure/external-secrets
      prune: true
      wait: true
      timeout: 5m
  cluster-api-operator.yaml: |
    apiVersion: kustomize.toolkit.fluxcd.io/v1
    kind: Kustomization
    metadata:
      name: cluster-api-operator
      namespace: flux-system
    spec:
      interval: 10m
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      path: ./infrastructure/cluster-api-operator
      prune: true
      wait: true
      timeout: 5m
      dependsOn:
        - name: cert-manager
  orc.yaml: |
    apiVersion: kustomize.toolkit.fluxcd.io/v1
    kind: Kustomization
    metadata:
      name: orc
      namespace: flux-system
    spec:
      interval: 10m
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      path: ./infrastructure/orc
      prune: true
      wait: true
      timeout: 5m
  cluster-api-providers.yaml: |
    apiVersion: kustomize.toolkit.fluxcd.io/v1
    kind: Kustomization
    metadata:
      name: cluster-api-providers
      namespace: flux-system
    spec:
      interval: 10m
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      path: ./infrastructure/cluster-api-providers
      prune: true
      wait: true
      timeout: 10m
      dependsOn:
        - name: cluster-api-operator
        - name: external-secrets
        - name: orc
      {{- $capoVersion := index ((getResource "WorkloadCluster").metadata.annotations | default dict) "sveltos.argus.rpcu.io/capo-version" }}
      {{- if and $capoVersion (ne $capoVersion "default") }}
      # Per-cluster CAPO version override. Set the annotation
      # sveltos.argus.rpcu.io/capo-version on the CAPI Cluster CR (e.g.
      # "v0.14.4") to pin the CAPO InfrastructureProvider to a specific version
      # on this workload-turned-management cluster, overriding the repo-pinned
      # default. When the annotation is unset, empty, or the literal sentinel
      # "default" (the value chihiro writes when no override is chosen), this
      # patch is omitted entirely and the repo-pinned CAPO version applies.
      patches:
        - target:
            kind: InfrastructureProvider
            name: openstack
          patch: |
            apiVersion: operator.cluster.x-k8s.io/v1alpha2
            kind: InfrastructureProvider
            metadata:
              name: openstack
              namespace: capo-system
            spec:
              version: {{ $capoVersion }}
      {{- end }}
  capo-identity.yaml: |
    apiVersion: kustomize.toolkit.fluxcd.io/v1
    kind: Kustomization
    metadata:
      name: capo-identity
      namespace: flux-system
    spec:
      interval: 10m
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      path: ./infrastructure/capo-identity
      prune: true
      wait: false
      timeout: 5m
      dependsOn:
        - name: external-secrets
        - name: cluster-api-providers
  cluster-api-templates.yaml: |
    apiVersion: kustomize.toolkit.fluxcd.io/v1
    kind: Kustomization
    metadata:
      name: cluster-api-templates
      namespace: flux-system
    spec:
      interval: 10m
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      path: ./infrastructure/cluster-api-templates
      prune: true
      timeout: 10m
      dependsOn:
        - name: cluster-api-providers
  kamaji.yaml: |
    apiVersion: kustomize.toolkit.fluxcd.io/v1
    kind: Kustomization
    metadata:
      name: kamaji
      namespace: flux-system
    spec:
      interval: 10m
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      path: ./infrastructure/kamaji
      prune: true
      # wait: false — kamaji deploys its own etcd whose PVCs request the
      # csi-cinder-sc-delete StorageClass, provided by the openstack-cinder-csi
      # install (the separate openstack-integration ClusterProfile). Don't block
      # this Kustomization on those PVCs binding.
      wait: false
      timeout: 10m
      dependsOn:
        # The kamaji ControlPlaneProvider CR lives in cluster-api-providers; the
        # Helm install is the runtime it manages.
        - name: cluster-api-providers
      # Override the base's hardcoded kamaji-etcd.clusterDomain (mgmt.local) with
      # this cluster's domain via an extra valuesFrom ConfigMap.
      patches:
        - patch: |
            apiVersion: helm.toolkit.fluxcd.io/v2
            kind: HelmRelease
            metadata:
              name: kamaji
            spec:
              valuesFrom:
                - kind: ConfigMap
                  name: kamaji-values
                - kind: ConfigMap
                  name: kamaji-workload-values
          target:
            kind: HelmRelease
            name: kamaji
---
# Per-cluster kamaji Helm values overriding the base's hardcoded
# kamaji-etcd.clusterDomain (mgmt.local) with this cluster's <name>.local, so the
# bundled etcd's in-cluster DNS names resolve on the new management cluster.
apiVersion: v1
kind: ConfigMap
metadata:
  name: capi-management-kamaji-values
  namespace: projectsveltos
  annotations:
    projectsveltos.io/template: "true"
data:
  kamaji-workload-values.yaml: |
    apiVersion: v1
    kind: Namespace
    metadata:
      name: kamaji-system
    ---
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: kamaji-workload-values
      namespace: kamaji-system
    data:
      values.yaml: |
        kamaji-etcd:
          clusterDomain: "{{ .Cluster.metadata.name }}.local"
---
# Sveltos ClusterProfiles + backing ConfigMaps for the new management cluster.
# Pushed as raw manifests so the new cluster can manage its own workload
# clusters with the same profiles the current mgmt cluster uses.
apiVersion: v1
kind: ConfigMap
metadata:
  name: capi-management-sveltos-profiles
  namespace: projectsveltos
data:
  oidc-rbac-clusterprofile.yaml: |
    apiVersion: config.projectsveltos.io/v1beta1
    kind: ClusterProfile
    metadata:
      name: oidc-rbac
      namespace: projectsveltos
    spec:
      syncMode: ContinuousWithDriftDetection
      clusterSelector:
        matchLabels:
          type: workload
          sveltos.argus.rpcu.io/oidc-rbac: enabled
      policyRefs:
        - name: oidc-rbac
          namespace: projectsveltos
          kind: ConfigMap
  oidc-rbac-configmap.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: oidc-rbac
      namespace: projectsveltos
    data:
      oidc-rbac.yaml: |
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: oidc-kube-admin
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: ClusterRole
          name: cluster-admin
        subjects:
          - apiGroup: rbac.authorization.k8s.io
            kind: Group
            name: kube-admin
        ---
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: oidc-kube-user
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: ClusterRole
          name: cluster-admin
        subjects:
          - apiGroup: rbac.authorization.k8s.io
            kind: Group
            name: kube-user
        ---
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        metadata:
          name: system:kube-apiserver-to-kubelet
        rules:
          - apiGroups: [""]
            resources:
              - nodes/proxy
              - nodes/log
              - nodes/spec
              - nodes/metrics
              - pods/log
              - pods/exec
              - pods/portforward
            verbs: ["*"]
          - apiGroups: ["metrics.k8s.io"]
            resources:
              - nodes
              - pods
            verbs: ["get", "list"]
        ---
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: system:kube-apiserver-kubelet
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: ClusterRole
          name: system:kube-apiserver-to-kubelet
        subjects:
          - apiGroup: rbac.authorization.k8s.io
            kind: User
            name: kube-apiserver-kubelet-client
  cilium-clusterprofile.yaml: |
    apiVersion: config.projectsveltos.io/v1beta1
    kind: ClusterProfile
    metadata:
      name: cilium
      namespace: projectsveltos
    spec:
      syncMode: ContinuousWithDriftDetection
      clusterSelector:
        matchLabels:
          type: workload
          sveltos.argus.rpcu.io/cilium: enabled
      helmCharts:
        - repositoryURL: https://helm.cilium.io/
          repositoryName: cilium
          chartName: cilium/cilium
          # renovate: datasource=helm depName=cilium registryUrl=https://helm.cilium.io/
          chartVersion: "1.18.6"
          releaseName: cilium
          releaseNamespace: kube-system
          helmChartAction: Install
          values: |
            k8sServiceHost: "{{ .Cluster.spec.controlPlaneEndpoint.host }}"
            k8sServicePort: "{{ .Cluster.spec.controlPlaneEndpoint.port }}"
            kubeProxyReplacement: true
            l2announcements:
              enabled: false
            socketLB:
              hostNamespaceOnly: false
            envoy:
              enabled: false
            cni:
              exclusive: false
            ipam:
              operator:
                clusterPoolIPv4PodCIDRList:
                  - "{{ (index .Cluster.spec.clusterNetwork.pods.cidrBlocks 0) }}"
                clusterPoolIPv4MaskSize: 23
            clusterDomain: "{{ .Cluster.metadata.name }}.local"
  flux-clusterprofile.yaml: |
    apiVersion: config.projectsveltos.io/v1beta1
    kind: ClusterProfile
    metadata:
      name: flux
      namespace: projectsveltos
    spec:
      syncMode: OneTime
      # dependsOn cilium: Flux's pods can't schedule without a CNI, so Cilium
      # must be fully installed first (spine: cilium -> flux -> flux-instance ->
      # add-ons). A cluster that opts OUT of the Sveltos-managed Cilium
      # (cilium != enabled) simply isn't matched by the cilium profile, so the
      # dependency is treated as satisfied and Flux still deploys.
      dependsOn:
        - cilium
      clusterSelector:
        matchLabels:
          type: workload
      helmCharts:
        - repositoryURL: oci://ghcr.io/controlplaneio-fluxcd/charts
          repositoryName: flux-operator
          chartName: flux-operator
          # renovate: datasource=docker depName=ghcr.io/controlplaneio-fluxcd/charts/flux-operator
          chartVersion: "0.40.0"
          releaseName: flux-operator
          releaseNamespace: flux-system
          helmChartAction: Install
          values: |
            installCRDs: true
  flux-instance-clusterprofile.yaml: |
    apiVersion: config.projectsveltos.io/v1beta1
    kind: ClusterProfile
    metadata:
      name: flux-instance
      namespace: projectsveltos
    spec:
      syncMode: ContinuousWithDriftDetection
      dependsOn:
        - flux
      clusterSelector:
        matchLabels:
          type: workload
      policyRefs:
        - name: flux-sources
          namespace: projectsveltos
          kind: ConfigMap
  flux-sources-configmap.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: flux-sources
      namespace: projectsveltos
      annotations:
        projectsveltos.io/template: "true"
    data:
      flux-instance.yaml: |
        apiVersion: fluxcd.controlplane.io/v1
        kind: FluxInstance
        metadata:
          name: flux
          namespace: flux-system
        spec:
          distribution:
            version: "2.x"
            registry: "ghcr.io/fluxcd"
          components:
            - source-controller
            - kustomize-controller
            - helm-controller
            - notification-controller
          cluster:
            type: kubernetes
            multitenant: false
            networkPolicy: true
            domain: "{{ .Cluster.metadata.name }}.local"
          kustomize:
            patches:
              # Tuned down from --concurrent=42 (~10x default) which overloaded
              # etcd. Reset to the Flux default concurrency (4) and cap the
              # per-controller apiserver request rate to bound etcd load.
              - target:
                  kind: Deployment
                  name: "(kustomize-controller|helm-controller)"
                patch: |
                  - op: add
                    path: /spec/template/spec/containers/0/args/-
                    value: --concurrent=4
                  - op: add
                    path: /spec/template/spec/containers/0/args/-
                    value: --kube-api-qps=50
                  - op: add
                    path: /spec/template/spec/containers/0/args/-
                    value: --kube-api-burst=100
          sync:
            kind: GitRepository
            url: "https://github.com/RPCU/argus.git"
            ref: "refs/heads/main"
            path: "./infrastructure/fluxcd/operator"
            interval: "1m"
  openstack-ccm-clusterprofile.yaml: |
    apiVersion: config.projectsveltos.io/v1beta1
    kind: ClusterProfile
    metadata:
      name: openstack-ccm
      namespace: projectsveltos
    spec:
      syncMode: ContinuousWithDriftDetection
      dependsOn:
        - flux-instance
      clusterSelector:
        matchLabels:
          type: workload
          sveltos.argus.rpcu.io/openstack-integration: enabled
      templateResourceRefs:
        - resource:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
            kind: OpenStackCluster
            namespace: "{{ .Cluster.metadata.namespace }}"
            name: "{{ .Cluster.spec.infrastructureRef.name }}"
          identifier: OpenStackCluster
        - resource:
            apiVersion: v1
            kind: Secret
            namespace: mgmt
            name: cloud-controller-app-creds
          identifier: AppCreds
      policyRefs:
        - name: openstack-ccm-clouds
          namespace: projectsveltos
          kind: ConfigMap
        - name: openstack-ccm-workload-values
          namespace: projectsveltos
          kind: ConfigMap
        - name: openstack-ccm-flux-kustomization
          namespace: projectsveltos
          kind: ConfigMap
  openstack-ccm-clouds-configmap.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: openstack-ccm-clouds
      namespace: projectsveltos
      annotations:
        projectsveltos.io/template: "true"
    data:
      openstack-ccm-clouds.yaml: |
        {{- $cloudName := (getField "OpenStackCluster" "spec.identityRef.cloudName") }}
        {{- $cloudsYaml := index (getResource "AppCreds").data (printf "%s-clouds.yaml" $cloudName) | b64dec | fromYaml }}
        {{- $auth := $cloudsYaml.clouds.openstack.auth }}
        {{- $region := $cloudsYaml.clouds.openstack.region_name }}
        apiVersion: v1
        kind: Secret
        metadata:
          name: cloud-controller-clouds
          namespace: kube-system
        type: Opaque
        stringData:
          cloud.conf: |
            [Global]
            use-clouds=true
            clouds-file=/etc/config/clouds.yaml
            cloud=openstack
            tls-insecure=true

            [LoadBalancer]
            enabled=true
            floating-network-id=1cfd69da-057c-4748-a0d4-de5b0ca77db2
            create-monitor=true
            lb-provider=ovn
            lb-method=SOURCE_IP_PORT
          clouds.yaml: |
            clouds:
              openstack:
                auth:
                  auth_url: {{ $auth.auth_url }}
                  application_credential_name: "{{ $auth.application_credential_name }}"
                  application_credential_secret: "{{ $auth.application_credential_secret }}"
                  user_id: "{{ $auth.user_id }}"
                  project_id: "{{ $auth.project_id }}"
                region_name: {{ $region }}
                verify: false
                interface: public
                identity_api_version: 3
  openstack-ccm-workload-values-configmap.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: openstack-ccm-workload-values
      namespace: projectsveltos
    data:
      openstack-ccm-workload-values.yaml: |
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: openstack-ccm-workload-values
          namespace: kube-system
        data:
          values.yaml: |
            secret:
              enabled: true
              create: false
              name: cloud-controller-clouds
            tolerations:
              - key: node.cloudprovider.kubernetes.io/uninitialized
                value: "true"
                effect: NoSchedule
              - key: node-role.kubernetes.io/control-plane
                effect: NoSchedule
              - key: node-role.kubernetes.io/master
                effect: NoSchedule
  openstack-ccm-flux-kustomization-configmap.yaml: |
