# External CephFS CSI driver for OPT-IN workload clusters — provides
# ReadWriteMany (RWX) volumes backed by the EXISTING Rook/Ceph cluster on the
# bare-metal openstack cluster (rpcu-fs CephFilesystem). Workload clusters run
# as OpenStack VMs with no local Ceph, so they consume that cluster remotely
# (EXTERNAL mode), exactly like the mgmt cluster
# (clusters/mgmt/ceph-csi-cephfs.yaml).
#
# Delivered as a Flux takeover (NO Sveltos helmChart bootstrap — same rationale
# as openstack-cinder-csi: not bootstrap-critical, and a helmChart would fight
# Flux over the same Helm release). Flux is the SOLE owner.
#
# Three things are pushed:
#   1. the "ceph-csi-cephfs-cluster-values" ConfigMap (ceph-csi-cephfs ns) —
#      the remote Ceph FSID (clusterID) + monitor endpoints. Identical for every
#      cluster (one openstack Ceph cluster).
#   2. the "csi-cephfs-secret" Secret (ceph-csi-cephfs ns) — the Ceph user
#      credentials (adminID/adminKey). Pushed directly so the CSI driver works
#      immediately without waiting for Vault + ESO to sync. The same key is used
#      across all clusters (one CephFS CephClient on the openstack cluster).
#   3. the Flux Kustomization CR pointing at ./infrastructure/ceph-csi-cephfs,
#      patched to append the cluster-values ConfigMap as a second valuesFrom
#      (overriding the empty base csiConfig/clusterID).
#
# The base infrastructure/ceph-csi-cephfs also ships an ExternalSecret that
# tries to render the same secret from Vault via the vault-backend
# ClusterSecretStore. Once Vault is populated (out of band), ESO takes over and
# the static secret pushed here becomes the bootstrap that made the CSI driver
# work from day one. If Vault is never populated, the static secret persists
# and the ExternalSecret stays in SecretSyncedError (harmless).
#
# Gated by the opt-in label sveltos.argus.rpcu.io/ceph-csi-cephfs: enabled.
apiVersion: config.projectsveltos.io/v1beta1
kind: ClusterProfile
metadata:
  name: ceph-csi-cephfs
  namespace: projectsveltos
spec:
  syncMode: ContinuousWithDriftDetection
  dependsOn:
    # Pushes a Flux Kustomization CR + HelmRelease reconciled by the kustomize/
    # helm controllers, which only exist once Flux is installed.
    - flux-instance
    # The base ExternalSecret needs the `vault-backend` ClusterSecretStore + the
    # per-cluster secrets-<cluster> Vault mount, both provisioned by vault-auth.
    - vault-auth
  clusterSelector:
    matchLabels:
      type: workload
      sveltos.argus.rpcu.io/ceph-csi-cephfs: enabled
  policyRefs:
    - name: ceph-csi-cephfs-cluster-values
      namespace: projectsveltos
      kind: ConfigMap
    - name: ceph-csi-cephfs-secret
      namespace: projectsveltos
      kind: ConfigMap
    - name: ceph-csi-cephfs-flux-kustomization
      namespace: projectsveltos
      kind: ConfigMap
---
# The remote Ceph connection override pushed into the workload cluster's
# ceph-csi-cephfs namespace. Identical for every cluster (one openstack Ceph
# cluster) — NOT a Sveltos template.
#
# Remote Ceph connection details — identical for all workload clusters (one
# openstack Ceph cluster). Monitors are pinned LoadBalancer IPs on the openstack
# cluster's Cilium L2 network (10.0.0.242-244), reachable from any cluster on
# the same VLAN.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ceph-csi-cephfs-cluster-values
  namespace: projectsveltos
data:
  ceph-csi-cephfs-cluster-values.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: ceph-csi-cephfs-cluster-values
      namespace: ceph-csi-cephfs
    data:
      values.yaml: |
        csiConfig:
          - clusterID: "cbbf0098-8fc1-426e-b73d-b2b4ff6c7bb4"
            monitors:
              - "10.0.0.242:6789"
              - "10.0.0.243:6789"
              - "10.0.0.244:6789"
        storageClass:
          clusterID: "cbbf0098-8fc1-426e-b73d-b2b4ff6c7bb4"
---
# Static CephFS credentials pushed directly to every workload cluster so the
# CSI driver works immediately. Same user/key across all clusters (one CephFS
# CephClient on the openstack cluster). Once Vault is populated, ESO takes over
# via the ExternalSecret in the base infrastructure/ceph-csi-cephfs.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ceph-csi-cephfs-secret
  namespace: projectsveltos
data:
  csi-cephfs-secret.yaml: |
    apiVersion: v1
    kind: Namespace
    metadata:
      name: ceph-csi-cephfs
    ---
    apiVersion: v1
    kind: Secret
    metadata:
      name: csi-cephfs-secret
      namespace: ceph-csi-cephfs
    type: Opaque
    data:
      adminID: Y2VwaGZz
      adminKey: QVFERDlVZHFkb1IzS1JBQTFrOEdhVU5tUytSNWVpbXM4N1hzYmc9PQ==
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ceph-csi-cephfs-flux-kustomization
  namespace: projectsveltos
data:
  ceph-csi-cephfs-flux-kustomization.yaml: |
    apiVersion: kustomize.toolkit.fluxcd.io/v1
    kind: Kustomization
    metadata:
      name: ceph-csi-cephfs
      namespace: ceph-csi-cephfs
    spec:
      interval: 10m
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      path: ./infrastructure/ceph-csi-cephfs
      prune: true
      patches:
        - patch: |
            apiVersion: helm.toolkit.fluxcd.io/v2
            kind: HelmRelease
            metadata:
              name: ceph-csi-cephfs
            spec:
              valuesFrom:
                - kind: ConfigMap
                  name: ceph-csi-cephfs-values
                - kind: ConfigMap
                  name: ceph-csi-cephfs-cluster-values
          target:
            kind: HelmRelease
            name: ceph-csi-cephfs
