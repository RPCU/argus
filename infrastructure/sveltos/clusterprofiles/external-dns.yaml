# InternalDNS for OPT-IN workload clusters, delivered as a Flux takeover (NO
# Sveltos helmChart bootstrap — same rationale as openstack-ccm/openstack-cinder-csi:
# InternalDNS is not bootstrap-critical, and a Sveltos helmChart would fight Flux
# over the same Helm release). Flux is the SOLE owner.
#
# Each opt-in workload cluster syncs its Ingress / Gateway HTTPRoute records into
# the SHARED OpenStack Designate zone (rpcu.lan) under its OWN per-cluster
# subdomain <cluster>.rpcu.lan, with a per-cluster TXT ownership registry
# (txt-owner-id=<cluster>) so clusters never collide over records/ownership in
# the flat zone. This mirrors the subdomain-isolation pattern the vault-auth /
# cert-manager add-ons already use (<cluster>.rpcu.lan).
#
# Three things are pushed to each matching workload cluster:
#   1. the "openstack-credentials" Secret (internal-dns ns) — the SHARED
#      admin-project DNS Application Credential clouds.yaml, rendered by Sveltos
#      from the mgmt crossplane-system/cloud-controller-app-cred-dns Secret
#      (the connection secret of the admin-project app-cred with dns_manager
#      role only). ALL workload clusters share the same app-cred; subdomain
#      isolation is enforced by Designate policy (dns_manager can only manage
#      recordsets, not zones) and the per-cluster domainFilters below.
#   2. the "internal-dns-workload-values" ConfigMap (internal-dns ns) — overrides
#      the mgmt-specific base values.yaml: the per-cluster domainFilter
#      (<cluster>.rpcu.lan), a real TXT registry with txt-owner-id=<cluster>
#      (mgmt uses registry: noop), and txt-prefix to avoid wildcard TXT-name
#      rejection by Designate.
#   3. the Flux Kustomization CR (wrapping the SAME base infrastructure/external-dns
#      as mgmt — no separate workload overlay), patched to (a) append that
#      ConfigMap as a second valuesFrom (Helm merges valuesFrom in order — later
#      wins) and (b) `$patch: delete` the four mgmt-only resources from
#      secret-credentials.yaml that can't work on a workload cluster (the ESO
#      SecretStore + ExternalSecret reading capo-variables, and the capo-system
#      Role/RoleBinding — workload clusters have no capo-system/capo-variables).
#      The Namespace + ServiceAccount from that file are kept.
#
# The admin-project DNS app-cred (cloud-controller-dns) is created by Crossplane
# in clusters/mgmt/crossplane/openstack/cloud-controller-dns.yaml with only
# the dns_manager role. The app-cred ID is read from the Crossplane resource's
# status.atProvider.id; the secret is in the connection secret
# (cloud-controller-app-cred-dns). The clouds.yaml template hardcodes
# auth_url (gateway endpoint, unreachable from workload clusters) and
# region_name (single-region deployment).
#
# Gated by the opt-in label sveltos.argus.rpcu.io/external-dns: enabled.
#
# dependsOn the `flux-instance` ClusterProfile (which itself dependsOn `flux`):
# this profile pushes a Flux Kustomization CR + HelmRelease reconciled by the
# kustomize/helm controllers, which only exist once Flux is installed.
apiVersion: config.projectsveltos.io/v1beta1
kind: ClusterProfile
metadata:
  name: external-dns
  namespace: projectsveltos
spec:
  syncMode: ContinuousWithDriftDetection
  dependsOn:
    - flux-instance
  clusterSelector:
    matchLabels:
      type: workload
      sveltos.argus.rpcu.io/external-dns: enabled
  # Read the admin-project DNS app-cred connection secret from the management
  # cluster (contains attribute.secret — the app-cred secret). The OpenStack
  # Crossplane provider does NOT write attribute.id to the connection secret;
  # the app-cred ID is in the ApplicationCredentialV3's status.atProvider.id,
  # so we also register the resource itself.
  templateResourceRefs:
    - resource:
        apiVersion: v1
        kind: Secret
        namespace: crossplane-system
        name: cloud-controller-app-cred-dns
      identifier: DnsAppCredSecret
    - resource:
        apiVersion: identity.openstack.m.crossplane.io/v1alpha1
        kind: ApplicationCredentialV3
        namespace: crossplane-system
        name: cloud-controller-dns
      identifier: DnsAppCred
  policyRefs:
    - name: internal-dns-credentials
      namespace: projectsveltos
      kind: ConfigMap
    - name: internal-dns-workload-values
      namespace: projectsveltos
      kind: ConfigMap
    - name: internal-dns-flux-kustomization
      namespace: projectsveltos
      kind: ConfigMap
---
# Shared admin-project DNS credentials, generated DYNAMICALLY. Sveltos
# instantiates this template on the management cluster:
#   - DnsAppCredSecret: the app-cred connection secret from crossplane-system
#                        (contains attribute.secret).
#   - DnsAppCred: the ApplicationCredentialV3 resource itself
#                  (status.atProvider.id has the app-cred ID).
#
# It deploys an Opaque Secret openstack-credentials into the workload cluster's
# internal-dns namespace with a single clouds.yaml key under the cloud name
# "openstack" (matching OS_CLOUD=openstack in the base values). The inovex
# Designate webhook reads it at /etc/openstack/clouds.yaml.
#
# IMPORTANT: auth_url must be the gateway endpoint (https://keystone.rpcu.vpn) —
# the in-cluster Keystone is unreachable from a workload cluster.
apiVersion: v1
kind: ConfigMap
metadata:
  name: internal-dns-credentials
  namespace: projectsveltos
  annotations:
    projectsveltos.io/template: "true"
data:
  internal-dns-credentials.yaml: |
    {{- $appCredSecret := getResource "DnsAppCredSecret" }}
    {{- $appCred := getResource "DnsAppCred" }}
    {{- $appCredId := $appCred.status.atProvider.id }}
    {{- $appCredSecretVal := $appCredSecret.data.attribute.secret | b64dec }}
    apiVersion: v1
    kind: Secret
    metadata:
      name: openstack-credentials
      namespace: internal-dns
    type: Opaque
    stringData:
      clouds.yaml: |
        clouds:
          openstack:
            auth:
              auth_url: https://keystone.rpcu.vpn
              application_credential_id: "{{ $appCredId }}"
              application_credential_secret: "{{ $appCredSecretVal }}"
            region_name: eu-central
            verify: false
            interface: public
            identity_api_version: 3
---
# Per-cluster values override pushed into the workload cluster's internal-dns
# namespace. valuesFrom ConfigMaps are merged in order; the Flux Kustomization
# patch below appends this one AFTER the base internal-dns-values, so these keys
# win. Sveltos instantiates the {{ .Cluster.metadata.name }} template.
apiVersion: v1
kind: ConfigMap
metadata:
  name: internal-dns-workload-values
  namespace: projectsveltos
  annotations:
    projectsveltos.io/template: "true"
data:
  internal-dns-workload-values.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: internal-dns-workload-values
      namespace: internal-dns
    data:
      values.yaml: |
        # Only sync records under THIS cluster's subdomain, so clusters sharing
        # the flat rpcu.lan Designate zone never collide.
        domainFilters:
          - {{ .Cluster.metadata.name }}.rpcu.lan
        # Re-enable the TXT ownership registry (mgmt uses noop). A per-cluster
        # txt-owner-id scopes ownership so each cluster only manages its own
        # records. txt-prefix keeps generated TXT names valid for wildcards.
        registry: txt
        txtOwnerId: {{ .Cluster.metadata.name }}
        txtPrefix: "edns-"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: internal-dns-flux-kustomization
  namespace: projectsveltos
data:
  internal-dns-flux-kustomization.yaml: |
    apiVersion: kustomize.toolkit.fluxcd.io/v1
    kind: Kustomization
    metadata:
      name: internal-dns
      namespace: internal-dns
    spec:
      interval: 10m
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      # Same base as mgmt — no separate workload overlay. The mgmt-only
      # credential plumbing is stripped via $patch: delete below.
      path: ./infrastructure/external-dns
      prune: false
      patches:
        # Append the per-cluster override ConfigMap as a second valuesFrom.
        - patch: |
            apiVersion: helm.toolkit.fluxcd.io/v2
            kind: HelmRelease
            metadata:
              name: internal-dns
            spec:
              valuesFrom:
                - kind: ConfigMap
                  name: internal-dns-values
                - kind: ConfigMap
                  name: internal-dns-workload-values
          target:
            kind: HelmRelease
            name: internal-dns
        # Drop the mgmt-only ESO plumbing from secret-credentials.yaml — a
        # workload cluster has no capo-system namespace and no capo-variables
        # secret, so these would never reconcile. The openstack-credentials
        # Secret is instead pushed directly by this ClusterProfile
        # (internal-dns-credentials ConfigMap above). The Namespace +
        # ServiceAccount from secret-credentials.yaml are retained.
        - patch: |
            $patch: delete
            apiVersion: external-secrets.io/v1
            kind: SecretStore
            metadata:
              name: capo-system-secrets
              namespace: internal-dns
          target:
            kind: SecretStore
            name: capo-system-secrets
        - patch: |
            $patch: delete
            apiVersion: external-secrets.io/v1
            kind: ExternalSecret
            metadata:
              name: openstack-credentials
              namespace: internal-dns
          target:
            kind: ExternalSecret
            name: openstack-credentials
        - patch: |
            $patch: delete
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              name: capo-variables-reader
              namespace: capo-system
          target:
            kind: Role
            name: capo-variables-reader
        - patch: |
            $patch: delete
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              name: internal-dns-capo-variables-reader
              namespace: capo-system
          target:
            kind: RoleBinding
            name: internal-dns-capo-variables-reader
