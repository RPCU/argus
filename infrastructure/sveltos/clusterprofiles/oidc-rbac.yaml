apiVersion: config.projectsveltos.io/v1beta1
kind: ClusterProfile
metadata:
  name: oidc-rbac
  namespace: projectsveltos
spec:
  # Continuously reconcile and revert manual drift on the child clusters.
  syncMode: ContinuousWithDriftDetection
  clusterSelector:
    matchLabels:
      sveltos.argus.rpcu.io/oidc-rbac: enabled
  policyRefs:
    - name: oidc-rbac
      namespace: projectsveltos
      kind: ConfigMap
---
# The manifests Sveltos deploys to each matched child cluster.
apiVersion: v1
kind: ConfigMap
metadata:
  name: oidc-rbac
  namespace: projectsveltos
data:
  oidc-rbac.yaml: |
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    metadata:
      name: oidc-kube-admin
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: cluster-admin
    subjects:
      - apiGroup: rbac.authorization.k8s.io
        kind: Group
        name: kube-admin
    ---
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    metadata:
      name: oidc-kube-user
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: cluster-admin
    subjects:
      - apiGroup: rbac.authorization.k8s.io
        kind: Group
        name: kube-user
