apiVersion: config.projectsveltos.io/v1beta1
kind: ClusterProfile
metadata:
  name: oidc-rbac
  namespace: projectsveltos
spec:
  # Continuously reconcile and revert manual drift on the child clusters.
  syncMode: ContinuousWithDriftDetection
  clusterSelector:
    matchLabels:
      type: workload
      sveltos.argus.rpcu.io/oidc-rbac: enabled
  # Register the workload CAPI Cluster itself so the templated ConfigMap below
  # can read its annotations. .Cluster.metadata.* only reliably exposes
  # name/namespace/kind in Sveltos templates; arbitrary annotations (e.g.
  # chihiro.io/groups) must be read via getResource on an explicitly-registered
  # resource.
  templateResourceRefs:
    - resource:
        apiVersion: cluster.x-k8s.io/v1beta2
        kind: Cluster
        namespace: "{{ .Cluster.metadata.namespace }}"
        name: "{{ .Cluster.metadata.name }}"
      identifier: WorkloadCluster
  policyRefs:
    - name: oidc-rbac
      namespace: projectsveltos
      kind: ConfigMap
---
# The manifests Sveltos deploys to each matched child cluster.
apiVersion: v1
kind: ConfigMap
metadata:
  name: oidc-rbac
  namespace: projectsveltos
  annotations:
    # Render this ConfigMap as a Sveltos template per matched cluster.
    projectsveltos.io/template: "true"
data:
  oidc-rbac.yaml: |
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    metadata:
      name: oidc-kube-admin
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: cluster-admin
    subjects:
      - apiGroup: rbac.authorization.k8s.io
        kind: Group
        name: kube-admin
    {{- /*
      One cluster-admin ClusterRoleBinding per group name listed in the
      workload Cluster's `chihiro.io/groups` annotation (comma-separated).
      Whitespace around each name is trimmed; empty entries are skipped.
    */ -}}
    {{- $groups := index ((getResource "WorkloadCluster").metadata.annotations | default dict) "chihiro.io/groups" | default "" }}
    {{- range (splitList "," $groups) }}
    {{- $group := trim . }}
    {{- if $group }}
    ---
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    metadata:
      name: oidc-group-{{ $group }}
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: cluster-admin
    subjects:
      - apiGroup: rbac.authorization.k8s.io
        kind: Group
        name: {{ $group }}
    {{- end }}
    {{- end }}
    # ---------------------------------------------------------------
    # Kamaji kube-apiserver -> kubelet RBAC (workaround).
    # Kamaji does not call kubeadm's AllowAPIServerToAccessKubeletAPI
    # phase, so the ClusterRole + ClusterRoleBinding that let the
    # kube-apiserver proxy logs/exec/port-forward to node kubelets
    # are never created. Upstream: clastix/kamaji#1171
    # Remove once Kamaji ships the fix.
    # ---------------------------------------------------------------
    ---
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRole
    metadata:
      name: system:kube-apiserver-to-kubelet
    rules:
      - apiGroups: [""]
        resources:
          - nodes/proxy
          - nodes/log
          - nodes/spec
          - nodes/metrics
          - pods/log
          - pods/exec
          - pods/portforward
        verbs: ["*"]
      - apiGroups: ["metrics.k8s.io"]
        resources:
          - nodes
          - pods
        verbs: ["get", "list"]
    ---
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    metadata:
      name: system:kube-apiserver-kubelet
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: system:kube-apiserver-to-kubelet
    subjects:
      - apiGroup: rbac.authorization.k8s.io
        kind: User
        name: kube-apiserver-kubelet-client
