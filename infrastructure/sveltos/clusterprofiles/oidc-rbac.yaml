apiVersion: config.projectsveltos.io/v1beta1
kind: ClusterProfile
metadata:
  name: oidc-rbac
  namespace: projectsveltos
spec:
  # Continuously reconcile and revert manual drift on the child clusters.
  syncMode: ContinuousWithDriftDetection
  clusterSelector:
    matchLabels:
      type: workload
      sveltos.argus.rpcu.io/oidc-rbac: enabled
  policyRefs:
    - name: oidc-rbac
      namespace: projectsveltos
      kind: ConfigMap
---
# The manifests Sveltos deploys to each matched child cluster.
apiVersion: v1
kind: ConfigMap
metadata:
  name: oidc-rbac
  namespace: projectsveltos
data:
  oidc-rbac.yaml: |
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    metadata:
      name: oidc-kube-admin
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: cluster-admin
    subjects:
      - apiGroup: rbac.authorization.k8s.io
        kind: Group
        name: kube-admin
    ---
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    metadata:
      name: oidc-kube-user
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: cluster-admin
    subjects:
      - apiGroup: rbac.authorization.k8s.io
        kind: Group
        name: kube-user
    # ---------------------------------------------------------------
    # Kamaji kube-apiserver -> kubelet RBAC (workaround).
    # Kamaji does not call kubeadm's AllowAPIServerToAccessKubeletAPI
    # phase, so the ClusterRole + ClusterRoleBinding that let the
    # kube-apiserver proxy logs/exec/port-forward to node kubelets
    # are never created. Upstream: clastix/kamaji#1171
    # Remove once Kamaji ships the fix.
    # ---------------------------------------------------------------
    ---
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRole
    metadata:
      name: system:kube-apiserver-to-kubelet
    rules:
      - apiGroups: [""]
        resources:
          - nodes/proxy
          - nodes/log
          - nodes/spec
          - nodes/metrics
          - pods/log
          - pods/exec
          - pods/portforward
        verbs: ["*"]
      - apiGroups: ["metrics.k8s.io"]
        resources:
          - nodes
          - pods
        verbs: ["get", "list"]
    ---
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    metadata:
      name: system:kube-apiserver-kubelet
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: system:kube-apiserver-to-kubelet
    subjects:
      - apiGroup: rbac.authorization.k8s.io
        kind: User
        name: kube-apiserver-kubelet-client
