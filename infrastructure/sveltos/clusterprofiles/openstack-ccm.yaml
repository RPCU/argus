# OCCM for OPT-IN workload clusters, delivered as a Flux takeover.
# Why no Sveltos helmChart bootstrap: the CCM is not required to bring a cluster
# up, and a helmChart would permanently fight Flux over the same Helm release.
# Flux is the sole owner; this profile only pushes manifests.
#
# Gated by sveltos.argus.rpcu.io/openstack-integration: enabled (shared with
# openstack-cinder-csi and external-snapshotter — one label opts into the full
# OpenStack integration stack). dependsOn: flux-instance (pushes a Flux
# Kustomization CR that requires the helm-controller).
apiVersion: config.projectsveltos.io/v1beta1
kind: ClusterProfile
metadata:
  name: openstack-ccm
  namespace: projectsveltos
spec:
  syncMode: ContinuousWithDriftDetection
  dependsOn:
    - flux-instance
  clusterSelector:
    matchLabels:
      type: workload
      sveltos.argus.rpcu.io/openstack-integration: enabled
  # OpenStackCluster: workload cluster's project (spec.identityRef.cloudName).
  # AppCreds: multi-project Application Credential clouds.yaml (mgmt ns).
  templateResourceRefs:
    - resource:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: OpenStackCluster
        namespace: "{{ .Cluster.metadata.namespace }}"
        name: "{{ .Cluster.spec.infrastructureRef.name }}"
      identifier: OpenStackCluster
    - resource:
        apiVersion: v1
        kind: Secret
        namespace: mgmt
        name: cloud-controller-app-creds
      identifier: AppCreds
  policyRefs:
    - name: openstack-ccm-clouds
      namespace: projectsveltos
      kind: ConfigMap
    - name: openstack-ccm-workload-values
      namespace: projectsveltos
      kind: ConfigMap
    - name: openstack-ccm-flux-kustomization
      namespace: projectsveltos
      kind: ConfigMap
---
# Per-cluster clouds.yaml + cloud.conf, templated from the AppCreds secret.
# Scoped to this cluster's project only (other projects' creds are not leaked).
apiVersion: v1
kind: ConfigMap
metadata:
  name: openstack-ccm-clouds
  namespace: projectsveltos
  annotations:
    projectsveltos.io/template: "true"
data:
  openstack-ccm-clouds.yaml: |
    {{- $cloudName := (getField "OpenStackCluster" "spec.identityRef.cloudName") }}
    {{- $cloudsYaml := index (getResource "AppCreds").data (printf "%s-clouds.yaml" $cloudName) | b64dec | fromYaml }}
    {{- $auth := $cloudsYaml.clouds.openstack.auth }}
    {{- $region := $cloudsYaml.clouds.openstack.region_name }}
    apiVersion: v1
    kind: Secret
    metadata:
      name: cloud-controller-clouds
      namespace: kube-system
    type: Opaque
    stringData:
      cloud.conf: |
        [Global]
        use-clouds=true
        clouds-file=/etc/config/clouds.yaml
        cloud=openstack
        tls-insecure=true

        [LoadBalancer]
        enabled=true
        floating-network-id=1cfd69da-057c-4748-a0d4-de5b0ca77db2
        create-monitor=true
        lb-provider=ovn
        lb-method=SOURCE_IP_PORT
      clouds.yaml: |
        clouds:
          openstack:
            auth:
              auth_url: {{ $auth.auth_url }}
              application_credential_name: "{{ $auth.application_credential_name }}"
              application_credential_secret: "{{ $auth.application_credential_secret }}"
              user_id: "{{ $auth.user_id }}"
            region_name: {{ $region }}
            verify: false
            interface: public
            identity_api_version: 3
---
# Per-cluster CCM values override. Sets cluster.name so Octavia LB / floating-IP
# descriptions read "... from cluster <name>" instead of the chart default
# "kubernetes". Sveltos-templated.
apiVersion: v1
kind: ConfigMap
metadata:
  name: openstack-ccm-workload-values
  namespace: projectsveltos
  annotations:
    projectsveltos.io/template: "true"
data:
  openstack-ccm-workload-values.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: openstack-ccm-workload-values
      namespace: kube-system
    data:
      values.yaml: |
        cluster:
          name: {{ .Cluster.metadata.name }}
        secret:
          enabled: true
          create: false
          name: cloud-controller-clouds
        # nodeSelector cannot be removed via Helm map-merge; the chart default
        # node-role.kubernetes.io/control-plane is replaced by a postRenderer
        # ($patch: replace) on the Flux Kustomization below.
        tolerations:
          - key: node.cloudprovider.kubernetes.io/uninitialized
            value: "true"
            effect: NoSchedule
          - key: node-role.kubernetes.io/control-plane
            effect: NoSchedule
          - key: node-role.kubernetes.io/master
            effect: NoSchedule
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openstack-ccm-flux-kustomization
  namespace: projectsveltos
data:
  openstack-ccm-flux-kustomization.yaml: |
    apiVersion: kustomize.toolkit.fluxcd.io/v1
    kind: Kustomization
    metadata:
      name: openstack-ccm
      namespace: kube-system
    spec:
      interval: 10m
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      path: ./infrastructure/openstack-ccm
      prune: true
      patches:
        - patch: |
            apiVersion: helm.toolkit.fluxcd.io/v2
            kind: HelmRelease
            metadata:
              name: openstack-cloud-controller-manager
            spec:
              valuesFrom:
                - kind: ConfigMap
                  name: openstack-ccm-values
                - kind: ConfigMap
                  name: openstack-ccm-workload-values
              postRenderers:
                - kustomize:
                    patches:
                      - target:
                          kind: DaemonSet
                          name: openstack-cloud-controller-manager
                        patch: |
                          apiVersion: apps/v1
                          kind: DaemonSet
                          metadata:
                            name: openstack-cloud-controller-manager
                          spec:
                            template:
                              spec:
                                nodeSelector:
                                  $patch: replace
                                  kubernetes.io/os: linux
          target:
            kind: HelmRelease
            name: openstack-cloud-controller-manager
