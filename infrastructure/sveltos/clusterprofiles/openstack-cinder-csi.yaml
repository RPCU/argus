# OpenStack Cinder CSI driver for OPT-IN workload clusters, delivered as a Flux
# takeover (NO Sveltos helmChart bootstrap — same rationale as openstack-ccm:
# Cinder is not bootstrap-critical, and a Sveltos helmChart would fight Flux over
# the same Helm release). Flux is the SOLE owner.
#
# The shared cloud-controller-clouds Secret is NOT pushed here — the openstack-ccm
# ClusterProfile owns it. If both profiles deployed it, Sveltos would flag a
# conflict ("A conflict was detected while deploying resource
# Secret:kube-system/cloud-controller-clouds"). The Cinder CSI HelmRelease mounts
# the same secret (secret.name: cloud-controller-clouds) — it just doesn't own it.
# The VolumeSnapshot CRDs + snapshot-controller come from the
# external-snapshotter ClusterProfile (Flux), required by the csi-snapshotter
# sidecar.
#
# Two things are pushed:
#   1. the "openstack-cinder-csi-workload-values" ConfigMap (kube-system) —
#      overrides the mgmt-specific base values.yaml: the shared secret name
#      (cloud-controller-clouds), secret.filename cloud.conf, and the per-cluster
#      clusterID (templated from the Cluster resource).
#   2. the Flux Kustomization CR, patched to add that ConfigMap as a second
#      valuesFrom (so it overrides the base) and to dependsOn the
#      external-snapshotter-crds Flux Kustomization (the csi-snapshotter sidecar
#      needs the VolumeSnapshot CRDs registered first).
#
# Gated by the opt-in label sveltos.argus.rpcu.io/openstack-integration: enabled
# — the SAME label as the openstack-ccm ClusterProfile. Cinder CSI cannot function
# without the CCM (it mounts the CCM-owned cloud-controller-clouds Secret and
# needs the CCM to remove the cloud-provider node taint so its pods schedule), so
# the two are gated together on one label to avoid a cluster opting into Cinder
# without the CCM and wedging on the unsatisfiable dependency.
apiVersion: config.projectsveltos.io/v1beta1
kind: ClusterProfile
metadata:
  name: openstack-cinder-csi
  namespace: projectsveltos
spec:
  syncMode: ContinuousWithDriftDetection
  # flux-instance: this profile pushes a Flux Kustomization CR + HelmRelease
  # (infrastructure/openstack-cinder-csi) reconciled by the kustomize/helm
  # controllers, which only exist once Flux is installed. (openstack-ccm and
  # external-snapshotter already dependsOn flux-instance too, so this is also
  # transitively satisfied — kept explicit for robustness.)
  # openstack-ccm owns the shared cloud-controller-clouds Secret and initialises
  # Nodes (removes the cloud-provider taint) so the CSI DaemonSet can schedule;
  # external-snapshotter installs the VolumeSnapshot CRDs the sidecar needs.
  dependsOn:
    - flux-instance
    - openstack-ccm
    - external-snapshotter
  clusterSelector:
    matchLabels:
      type: workload
      sveltos.argus.rpcu.io/openstack-integration: enabled
  policyRefs:
    - name: openstack-cinder-csi-workload-values
      namespace: projectsveltos
      kind: ConfigMap
    - name: openstack-cinder-csi-flux-kustomization
      namespace: projectsveltos
      kind: ConfigMap
---
# Per-cluster values override pushed into the workload cluster's kube-system.
# Sveltos instantiates the {{ .Cluster.metadata.name }} template (clusterID).
apiVersion: v1
kind: ConfigMap
metadata:
  name: openstack-cinder-csi-workload-values
  namespace: projectsveltos
  annotations:
    projectsveltos.io/template: "true"
data:
  openstack-cinder-csi-workload-values.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: openstack-cinder-csi-workload-values
      namespace: kube-system
    data:
      values.yaml: |
        secret:
          enabled: true
          hostMount: false
          create: false
          name: cloud-controller-clouds
          filename: cloud.conf
        clusterID: "{{ .Cluster.metadata.name }}"
        storageClass:
          enabled: true
          delete:
            isDefault: true
            allowVolumeExpansion: true
          retain:
            isDefault: false
            allowVolumeExpansion: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openstack-cinder-csi-flux-kustomization
  namespace: projectsveltos
data:
  openstack-cinder-csi-flux-kustomization.yaml: |
    apiVersion: kustomize.toolkit.fluxcd.io/v1
    kind: Kustomization
    metadata:
      name: openstack-cinder-csi
      namespace: kube-system
    spec:
      interval: 10m
      dependsOn:
        - name: external-snapshotter-crds
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      path: ./infrastructure/openstack-cinder-csi
      prune: false
      patches:
        - patch: |
            apiVersion: helm.toolkit.fluxcd.io/v2
            kind: HelmRelease
            metadata:
              name: openstack-cinder-csi
            spec:
              valuesFrom:
                - kind: ConfigMap
                  name: openstack-cinder-csi-values
                - kind: ConfigMap
                  name: openstack-cinder-csi-workload-values
          target:
            kind: HelmRelease
            name: openstack-cinder-csi
