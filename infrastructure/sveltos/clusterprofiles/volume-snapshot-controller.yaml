# Snapshot-controller Deployment + RBAC for the Cinder CSI driver.
# The csi-snapshotter sidecar in the Cinder CSI controller plugin needs
# both the VolumeSnapshot CRDs (volume-snapshot-crds ConfigMap) and a
# running snapshot-controller to handle VolumeSnapshot lifecycle.
#
# Uses kustomize remote base pinned to the same version as the mgmt
# cluster's infrastructure/external-snapshotter (v8.6.0). Sveltos fetches
# and applies the Deployment + RBAC to each matching child cluster.
apiVersion: v1
kind: ConfigMap
metadata:
  name: volume-snapshot-controller
  namespace: projectsveltos
  annotations:
    projectsveltos.io/kustomization: "true"
data:
  kustomization.yaml: |
    apiVersion: kustomize.config.k8s.io/v1beta1
    kind: Kustomization
    resources:
      - https://github.com/kubernetes-csi/external-snapshotter//deploy/kubernetes/snapshot-controller?ref=v8.6.0
