# VolumeSnapshot / VolumeGroupSnapshot CRDs for the Cinder CSI driver's
# csi-snapshotter sidecar. Without these CRDs registered, the sidecar
# cannot start and CSI snapshot operations are unavailable.
#
# Uses kustomize remote base pinned to the same version as the mgmt
# cluster's infrastructure/external-snapshotter (v8.6.0). Sveltos fetches
# and applies the CRDs to each matching child cluster.
apiVersion: v1
kind: ConfigMap
metadata:
  name: volume-snapshot-crds
  namespace: projectsveltos
  annotations:
    projectsveltos.io/kustomization: "true"
data:
  kustomization.yaml: |
    apiVersion: kustomize.config.k8s.io/v1beta1
    kind: Kustomization
    resources:
      - https://github.com/kubernetes-csi/external-snapshotter//client/config/crd?ref=v8.6.0
