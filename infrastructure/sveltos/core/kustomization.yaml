# Core Sveltos install for a management cluster.
#
# Contains only the pieces needed to run Sveltos on a single cluster:
# namespace, Helm repository, Helm release, and extra RBAC.
#
# The HelmRelease uses valuesFrom referencing a sveltos-core-values ConfigMap
# that must exist before Flux reconciles it. Sveltos pushes this ConfigMap
# (templated per-cluster) alongside the Flux Kustomization CR.
#
# Does NOT include clusterprofiles/ — those are pushed to child clusters by
# the mgmt-cluster Sveltos install, not deployed as part of the core.
resources:
  - namespace.yaml
  - helmrepo.yaml
  - helmrelease.yaml
  - rbac.yaml
