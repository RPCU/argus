# Exposes the Sveltos dashboard through the mgmt kgateway "https" Gateway.
# TLS terminates at the Gateway (*.mgmt.rpcu.lan wildcard cert); the dashboard
# service is plain HTTP behind it. The hostname here must match the dashboard
# OIDC redirectUri in ../dashboard.yaml.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sveltos-dashboard
  namespace: projectsveltos
spec:
  parentRefs:
    - name: https
      namespace: kgateway-system
      sectionName: https
  hostnames:
    - "sveltos.mgmt.rpcu.lan"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: dashboard
          port: 80
