# Sveltos core controllers (addon-controller, classifier, sveltos-manager,
# event-manager, etc.). The mgmt cluster is registered as a managed cluster of
# itself (managementCluster: true) so Sveltos can drive add-ons onto the
# workload clusters CAPI provisions, and onto the mgmt cluster directly.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: projectsveltos
  namespace: projectsveltos
spec:
  interval: 1h
  chart:
    spec:
      chart: projectsveltos
      version: 1.12.3
      interval: 5m
      sourceRef:
        kind: HelmRepository
        name: projectsveltos
        namespace: projectsveltos
  values:
    kubernetesClusterDomain: mgmt.local
    # Run the drift-detection / classifier agents in the management cluster
    # (no per-managed-cluster agent push). Appropriate while Sveltos only
    # manages the mgmt cluster + CAPI children from here.
    agent:
      managementCluster: true
    # Label the auto-registered management cluster so ClusterProfiles can
    # target it with clusterSelector: type=mgmt.
    registerMgmtClusterJob:
      registerMgmtCluster:
        args:
          - --labels=type=mgmt
