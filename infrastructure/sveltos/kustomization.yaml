# Basic Sveltos install (mgmt cluster).
#
# Structure (one concern per file):
#   namespace.yaml    - projectsveltos namespace
#   helmrepo.yaml     - projectsveltos Helm repository
#   helmrelease.yaml  - Sveltos core controllers
#   rbac.yaml         - extra RBAC for addon-controller templateResourceRefs
#                       (read OpenStackCluster + cloud-controller-app-creds;
#                        read capo-variables in capo-system for capi-management)
#   clusterprofiles/  - ClusterProfiles Sveltos pushes to child clusters
#                       (oidc-rbac: kube-admin/kube-user -> cluster-admin)
#                       (cilium: CNI via ContinuousWithDriftDetection)
#                       (flux: Flux operator bootstrap + FluxInstance reconcile)
#                       (openstack-ccm: OpenStack CCM for workload clusters)
#                       (openstack-cinder-csi: Cinder CSI + VolumeSnapshot)
#                       (external-snapshotter: VolumeSnapshot CRDs + controller)
#                       (capi-management: CAPI/CAPO stack for new mgmt clusters)
#                       (vault-auth: per-child Vault k8s auth backend + ESO
#                        ClusterSecretStore against the shared mgmt Vault)
resources:
  - namespace.yaml
  - helmrepo.yaml
  - helmrelease.yaml
  - rbac.yaml
  - clusterprofiles/
