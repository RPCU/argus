# Extra RBAC for the Sveltos addon-controller so its templates can read
# management-cluster resources via templateResourceRefs.
#
# The openstack-ccm ClusterProfile (clusterprofiles/openstack-ccm.yaml) uses
# templateResourceRefs to fetch, per workload cluster:
#   - the OpenStackCluster (to read spec.identityRef.cloudName = the project);
#   - the cloud-controller-app-creds Secret (mgmt namespace) — the multi-project
#     Application Credential clouds.yaml rendered by ESO on mgmt.
#
# Sveltos follows least-privilege and ships an EMPTY addon-controller-role-extra
# ClusterRole for exactly this purpose. Rather than edit that chart-managed
# (and therefore Helm-reconciled / potentially-overwritten) role, we add our own
# ClusterRole and bind it to the same addon-controller ServiceAccount.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: addon-controller-argus-template-reader
rules:
  # Read OpenStackCluster to resolve each workload cluster's OpenStack project
  # (spec.identityRef.cloudName).
  - apiGroups: ["infrastructure.cluster.x-k8s.io"]
    resources: ["openstackclusters"]
    verbs: ["get", "list", "watch"]
  # Read the cloud-controller-app-creds Secret so the per-cluster CCM credentials
  # can be rendered. Scoped to the mgmt namespace (get by name; no broad
  # list/watch on secrets).
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["cloud-controller-app-creds"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: addon-controller-argus-template-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: addon-controller-argus-template-reader
subjects:
  - kind: ServiceAccount
    name: addon-controller
    namespace: projectsveltos
---
# RBAC for the capi-management ClusterProfile: grant the addon-controller read
# access to the capo-variables Secret in the capo-system namespace on the
# management cluster. The templateResourceRefs in the capi-management profile
# read this secret and push it to target clusters as part of the CAPI/CAPO
# bootstrap.
#
# Uses a namespace-scoped Role (not the ClusterRole) because the ClusterRole
# has resourceNames restrictions that prevent listing secrets in arbitrary
# namespaces. The Role allows get/list on the capo-system namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: addon-controller-capo-variables-reader
  namespace: capo-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["capo-variables"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: addon-controller-capo-variables-reader
  namespace: capo-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: addon-controller-capo-variables-reader
subjects:
  - kind: ServiceAccount
    name: addon-controller
    namespace: projectsveltos
