# Extra RBAC for the Sveltos addon-controller so its templates can read
# management-cluster resources via templateResourceRefs and manage Vault
# Crossplane MRs deployed locally on mgmt.
#
# Consumers:
#   - The openstack-ccm ClusterProfile (clusterprofiles/openstack-ccm.yaml) uses
#     templateResourceRefs to fetch, per workload cluster:
#       - the OpenStackCluster (to read spec.identityRef.cloudName = the project);
#       - the cloud-controller-app-creds Secret (mgmt namespace) — the multi-project
#         Application Credential clouds.yaml rendered by ESO on mgmt.
#   - The vault-auth EventTrigger + nested ClusterProfile
#     (clusterprofiles/vault-auth.yaml) deploys Crossplane MRs LOCALLY on mgmt:
#       - Backend (auth.vault.upbound.io) — kubernetes auth mount per cluster
#       - Policy (vault.vault.upbound.io) — KV-v2 read per cluster
#       - AuthBackendConfig (kubernetes.vault.upbound.io) — workload cluster API host + CA
#       - AuthBackendRole (kubernetes.vault.upbound.io) — ESO SA binding
#
# Sveltos follows least-privilege and ships an EMPTY addon-controller-role-extra
# ClusterRole for exactly this purpose. Rather than edit that chart-managed
# (and therefore Helm-reconciled / potentially-overwritten) role, we add our own
# ClusterRole and bind it to the same addon-controller ServiceAccount.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: addon-controller-argus-template-reader
rules:
  # Read OpenStackCluster to resolve each workload cluster's OpenStack project
  # (spec.identityRef.cloudName).
  - apiGroups: ["infrastructure.cluster.x-k8s.io"]
    resources: ["openstackclusters"]
    verbs: ["get", "list", "watch"]
  # Read Secrets for templateResourceRefs, across consumers:
  #   - cloud-controller-app-creds (mgmt ns) for the openstack-ccm profile;
  #   - CAPI cluster CA secrets <cluster-name>-ca (key tls.crt) and the
  #     root-mgmt CA (cert-manager ns) for the vault-auth profile
  #     (clusterprofiles/vault-auth.yaml) — used to configure each workload
  #     cluster's Vault Kubernetes auth backend and to push the root-mgmt CA
  #     bundle to the workload cluster.
  # The <name>-ca secret name is per-cluster, so it can't be pinned via
  # resourceNames; this grants get/list/watch on secrets (the addon-controller
  # already has broad cluster access for add-on delivery).
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  # Manage Vault Crossplane MRs deployed locally on mgmt by the vault-auth
  # EventTrigger + nested ClusterProfile (clusterprofiles/vault-auth.yaml):
  #   - Backend (auth.vault.upbound.io) — kubernetes auth mount per cluster
  #   - Policy (vault.vault.upbound.io) — KV-v2 read per cluster
  #   - AuthBackendConfig (kubernetes.vault.upbound.io) — workload cluster API host + CA
  #   - AuthBackendRole (kubernetes.vault.upbound.io) — ESO SA binding
  - apiGroups: ["auth.vault.upbound.io"]
    resources: ["backends"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["vault.vault.upbound.io"]
    resources: ["policies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["kubernetes.vault.upbound.io"]
    resources: ["authbackendconfigs", "authbackendroles"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: addon-controller-argus-template-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: addon-controller-argus-template-reader
subjects:
  - kind: ServiceAccount
    name: addon-controller
    namespace: projectsveltos
