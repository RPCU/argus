apiVersion: platform.didactiklabs.io/v1alpha1
kind: Unseal
metadata:
  name: internal-vault
  namespace: vault-unseal-controller-system
spec:
  vaultNodes:
    - http://vault-0.vault-internal.vault.svc:8200
    - http://vault-1.vault-internal.vault.svc:8200
    - http://vault-2.vault-internal.vault.svc:8200
  unsealKeysSecretRef:
    name: thresholdkeys
    namespace: vault-unseal-controller-system
  retryCount: 3
