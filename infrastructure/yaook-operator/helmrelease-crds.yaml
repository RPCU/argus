---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crds
spec:
  interval: 5m
  chart:
    spec:
      chart: crds
      version: "2.0.3"
      sourceRef:
        kind: HelmRepository
        name: yaook-operator
        namespace: yaook
  install:
    createNamespace: true
  upgrade:
    crds: CreateReplace
