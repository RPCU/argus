---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: infra-operator
spec:
  interval: 5m
  dependsOn:
    - name: crds
  chart:
    spec:
      chart: infra-operator
      version: "2.0.3"
      sourceRef:
        kind: HelmRepository
        name: yaook-operator
        namespace: yaook
  install:
    createNamespace: true
