---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: neutron-operator
spec:
  interval: 5m
  dependsOn:
    - name: crds
  chart:
    spec:
      chart: neutron-operator
      version: "3.0.0"
      sourceRef:
        kind: HelmRepository
        name: yaook-operator
        namespace: yaook
  install:
    createNamespace: true
