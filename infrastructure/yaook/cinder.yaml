apiVersion: yaook.cloud/v1
kind: CinderDeployment
metadata:
  name: cinder
spec:
  backup: {}
  api:
    ingress:
      createIngress: false
      fqdn: cinder.rpcu.vpn
      ingressClassName: nginx
      port: 443
    publishEndpoint: true
    replicas: 3
    scheduleRuleWhenUnsatisfiable: ScheduleAnyway
    resources:
      cinder-api:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          memory: 2Gi
  backends:
    rook-ceph-rbd:
      rbd:
        backendConfig:
          backend_availability_zone: nova
          # backend_host removed for cluster mode (Stage 2).
          # In cluster:true mode, cinder uses the cluster name as the host
          # identifier; setting backend_host with replicas>1 is unsupported.
          rbd_pool: rdb-pool
          rbd_secret_uuid: b3ab713d-912b-49ed-adaf-bd74368e567a
        cephConfig:
          mon host: rook-ceph-mon-a.rook-ceph.svc:6789,rook-ceph-mon-d.rook-ceph.svc:6789,rook-ceph-mon-f.rook-ceph.svc:6789
        keyringReference: rook-ceph-client-cinder
        keyringUsername: cinder
      volume:
        # STAGE 2 (final): active-active cluster with 3 replicas.
        # PREREQUISITE: Stage 1 must have completed first — verify the
        # cinder-volume pod logs showed volume migration messages, OR
        # manually migrated volumes via:
        #   yaookctl shell cinder api
        #   cinder-manage volume update_host --current <old> --new <new>
        #   cinder-manage volume update_service
        # Then clean up the orphaned single-host service entry via:
        #   cinder-manage service list / remove
        cluster: true
        replicas: 3
        scheduleRuleWhenUnsatisfiable: ScheduleAnyway
        resources:
          cinder-volume:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 2Gi
  cinderConfig:
    DEFAULT:
      debug: false
      image_volume_cache_enabled: True
      osapi_volume_workers: 4
    database:
      connection_recycle_time: 280
      max_pool_size: 20
      max_overflow: 30
  database:
    backup:
      mysqldump: false
      schedule: 0 * * * *
      warmKeepMax: "3"
    proxy:
      replicas: 1
      scheduleRuleWhenUnsatisfiable: ScheduleAnyway
    replicas: 1
    scheduleRuleWhenUnsatisfiable: ScheduleAnyway
    storageSize: 8Gi
    timeoutClient: 300
    tolerateNodeDown: false
  databaseCleanup:
    deletionTimeRange: 60
    schedule: 0 0 * * *
  issuerRef:
    name: yaook-internal
  keystoneRef:
    kind: KeystoneDeployment
    name: keystone
  memcached:
    connections: 1024
    memory: 512
    replicas: 3
    scheduleRuleWhenUnsatisfiable: ScheduleAnyway
  messageQueue:
    replicas: 1
    resources:
      rabbitmq:
        requests:
          cpu: 1000m
          memory: 1G
        limits:
          memory: 2G
    scheduleRuleWhenUnsatisfiable: ScheduleAnyway
    storageSize: 8Gi
    tolerateNodeDown: false
  policy:
    context_is_admin: role:admin
  region:
    name: hetzner
  scheduler:
    replicas: 3
    scheduleRuleWhenUnsatisfiable: ScheduleAnyway
    resources:
      cinder-scheduler:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          memory: 1Gi
  targetRelease: "2026.1"
