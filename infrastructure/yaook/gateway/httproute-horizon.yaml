apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httproute-horizon
spec:
  parentRefs:
    - name: https
      namespace: kgateway-system
      sectionName: https
  hostnames:
    - "os.rpcu.vpn"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: horizon
          port: 8443
---
# Re-encrypt traffic between kgateway and the Horizon pod.
# The rpcu-bundle ConfigMap (distributed by trust-manager) contains the CA
# certificate used to verify the Horizon pod's TLS certificate.
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: horizon-backend-tls
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: horizon
  validation:
    caCertificateRefs:
      - group: ""
        kind: ConfigMap
        name: rpcu-bundle
    hostname: os.rpcu.vpn
