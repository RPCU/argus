apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httproute-horizon
spec:
  parentRefs:
    - name: https
      namespace: kgateway-system
      sectionName: https
  hostnames:
    - "os.rpcu.vpn"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: horizon
          port: 8443
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: BackendConfigPolicy
metadata:
  name: horizon-backend-tls
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: horizon
  tls:
    insecureSkipVerify: true
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: horizon-append-slash
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: httproute-horizon
  urlRewrite:
    pathRegex:
      pattern: "^(.*[^/])$"
      substitution: "\\1/"
