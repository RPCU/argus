apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httproute-horizon
  namespace: yaook
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: https
      namespace: kgateway-system
      sectionName: https
  hostnames:
    - "os.rpcu.vpn"
  rules:
    - backendRefs:
        - name: horizon
          port: 8080
