apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httproute-octavia
  namespace: yaook
spec:
  parentRefs:
    - name: https
      namespace: kgateway-system
      sectionName: https
  hostnames:
    - "octavia.rpcu.vpn"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: octavia-api
          port: 9877
---
apiVersion: gateway.networking.k8s.io/v1alpha3
kind: BackendTLSPolicy
metadata:
  name: backendtls-octavia
  namespace: yaook
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: octavia-api
  validation:
    caCertificateRefs:
      - group: ""
        kind: ConfigMap
        name: rpcu-bundle
    hostname: octavia.rpcu.vpn
