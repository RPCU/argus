apiVersion: gateway.networking.x-k8s.io/v1alpha1
kind: XListenerSet
metadata:
  name: yaook-passthrough-listeners
  namespace: yaook # XListenerSet is namespaced
spec:
  parentRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: https
    namespace: kgateway-system
  listeners:
    - protocol: TLS
      port: 443
      name: yaook-passthrough
      hostname: "*.rpcu.vpn"
      tls:
        mode: Passthrough
