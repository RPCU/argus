apiVersion: gateway.networking.k8s.io/v1alpha3
kind: TLSRoute
metadata:
  name: tlsroute-horizon
spec:
  parentRefs:
    - group: gateway.networking.x-k8s.io
      kind: XListenerSet
      name: yaook-passthrough-listeners
      namespace: yaook
      sectionName: yaook-passthrough-horizon
  hostnames:
    - "os.rpcu.vpn"
  rules:
    - backendRefs:
        - name: horizon
          port: 8443
          # The protocol field in backendRefs for TLSRoute is implicitly TCP or TLS
          # based on the parent listener's protocol (TLS in this case).
          # Since it's passthrough, we don't specify protocol here.
