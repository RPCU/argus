apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: horizon-trailing-slash
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: httproute-horizon
  urlRewrite:
    pathRegex:
      pattern: "^((?:/[^/.]+)+)$"
      substitution: "\\1/"
