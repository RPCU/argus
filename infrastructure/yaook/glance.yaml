apiVersion: yaook.cloud/v1
kind: GlanceDeployment
metadata:
  name: glance
spec:
  keystoneRef:
    name: keystone
  database:
    replicas: 1
    timeoutClient: 300
    proxy:
      replicas: 1
    backup:
      schedule: "0 * * * *"
  memcached:
    connections: 1024
    memory: 512
    replicas: 1
    scheduleRuleWhenUnsatisfiable: ScheduleAnyway
  api:
    replicas: 3
    ingress:
      createIngress: false
      fqdn: "glance.rpcu.vpn"
      port: 443
    resources:
      glance-api:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 2000m
          memory: 4Gi
  glanceConfig:
    DEFAULT:
      # Expose the RBD location of images so cinder/nova can create volumes
      # as instant copy-on-write clones inside Ceph instead of streaming a
      # full copy through the glance API (biggest VM-provisioning I/O win;
      # images must be raw format for COW cloning to kick in). Safe here:
      # glance and cinder share the same Ceph cluster/pool.
      show_image_direct_url: true
    glance_store:
      default_store: "rbd"
  backends:
    ceph:
      keyringReference: rook-ceph-client-glance
      keyringUsername: glance
      keyringPoolname: rdb-pool
      cephConfig:
        global:
          "mon_host": "rook-ceph-mon-a.rook-ceph:6789,rook-ceph-mon-d.rook-ceph:6789,rook-ceph-mon-f.rook-ceph:6789"
  policy:
    "context_is_admin": "role:admin"
  region:
    name: hetzner
  issuerRef:
    name: yaook-internal
  targetRelease: "2026.1"
