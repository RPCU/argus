apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  name: cinder
  namespace: yaook
spec:
  ingressClassName: contour
  virtualhost:
    fqdn: cinder.rpcu.vpn
  routes:
    - conditions:
        - prefix: /
      services:
        - name: cinder-api
          port: 8777
          protocol: tls
