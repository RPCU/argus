apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  name: horizon
  namespace: yaook
spec:
  ingressClassName: contour
  virtualhost:
    fqdn: os.rpcu.vpn
    tls:
      passthrough: true
  routes:
    - conditions:
        - prefix: /
      services:
        - name: horizon
          port: 8443
          protocol: tls
