apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  name: neutron
  namespace: yaook
spec:
  ingressClassName: contour
  virtualhost:
    fqdn: neutron.rpcu.vpn
  routes:
    - conditions:
        - prefix: /
      services:
        - name: neutron-api
          port: 9697
          protocol: tls
