apiVersion: yaook.cloud/v1
kind: NovaDeployment
metadata:
  name: nova
spec:
  keystoneRef:
    name: keystone
  database:
    api:
      replicas: 3
      timeoutClient: 300
      proxy: {}
      mysqlConfig:
        mysqld:
          max_connections: 1337
          max_heap_table_size: 64M
      backup:
        schedule: "0 * * * *"
    placement:
      replicas: 3
      timeoutClient: 300
      proxy: {}
      mysqlConfig:
        mysqld:
          max_connections: 1337
          max_heap_table_size: 64M
      backup:
        schedule: "0 * * * *"
    cell0:
      replicas: 3
      timeoutClient: 300
      proxy: {}
      mysqlConfig:
        galera:
          wsrep_slave_threads: 3
      backup:
        schedule: "0 * * * *"
    cell1:
      replicas: 3
      # have to be the same value as cell0 and api timeoutClient
      timeoutClient: 300
      proxy: {}
      mysqlConfig:
        galera:
          wsrep_slave_threads: 3
      backup:
        schedule: "0 * * * *"
  eviction:
    volumeLockDurationSeconds: 30
  messageQueue:
    cell1:
      replicas: 1
      resources:
        rabbitmq:
          limits:
            memory: 1G
            cpu: 1000m
  memcached: {}
  api:
    replicas: 3
    ingress:
      createIngress: false
      fqdn: "nova.rpcu.vpn"
      port: 443
  conductor:
    replicas: 3
  placement:
    replicas: 3
    ingress:
      createIngress: false
      fqdn: "placement.rpcu.vpn"
      port: 443
  scheduler:
    replicas: 3
  vnc:
    ingress:
      createIngress: false
      fqdn: "vnc.rpcu.vpn"
      port: 443
    replicas: 3
  metadata:
    replicas: 3
  targetRelease: "2025.1"
  novaConfig:
    DEFAULT:
      debug: True
  policy:
    "context_is_admin": "role:admin"
  compute:
    configTemplates:
      - nodeSelectors:
          - matchLabels: {}
        novaComputeConfig:
          DEFAULT:
            debug: True
          keystone_authtoken:
            os_region_name: hetzner
          libvirt:
            virt_type: qemu
        volumeBackends:
          ceph:
            enabled: True
            keyringSecretName: rook-ceph-client-cinder
            user: cinder
            uuid: "b3ab713d-912b-49ed-adaf-bd74368e567a"
            cephConfig: {}
  issuerRef:
    name: yaook-internal
  region:
    name: hetzner
  databaseCleanup:
    schedule: "0 0 * * *"
    clearAllEvents: False
    clearOnlyMigrationEvents: False
    deletionTimeRange: 60
  placementCleanup:
    schedule: "0 0 1 * *"
