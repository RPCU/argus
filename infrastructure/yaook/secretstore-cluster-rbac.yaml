apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: yaook-secretstore-cluster-reader
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: yaook-secretstore-cluster-reader-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: yaook-secretstore-cluster-reader
subjects:
  - kind: ServiceAccount
    name: secretstore
    namespace: yaook
