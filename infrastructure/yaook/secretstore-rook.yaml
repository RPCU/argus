apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: rook-ceph-secrets
  namespace: yaook
spec:
  provider:
    kubernetes:
      remoteNamespace: rook-ceph
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: secretstore
