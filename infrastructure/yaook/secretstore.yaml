apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: kubernetes-secrets
spec:
  provider:
    kubernetes:
      remoteNamespace: yaook
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: secretstore
